<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Centri Estivi · ASP Parma</title>
  <meta name="theme-color" content="#f5f5f4" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style> html, body { background: #e7e5e4; } * { -webkit-tap-highlight-color: transparent; } </style>
</head>
<body>
  <div id="root"></div>
  <script>
    Babel.registerPreset("classic", { presets: [[Babel.availablePresets.react, { runtime: "classic" }]] });
  </script>
  <script type="text/babel" data-presets="classic">
    const { useState, useEffect } = React;

    // ── CONFIGURAZIONE ──
    const firebaseConfig = {
      apiKey: "AIzaSyBbyyT-i9dyTT-5MxC47lsGI46ZSbiwqTE",
      authDomain: "centri-estivi-asp-2026.firebaseapp.com",
      databaseURL: "https://centri-estivi-asp-2026-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "centri-estivi-asp-2026",
      storageBucket: "centri-estivi-asp-2026.firebasestorage.app",
      messagingSenderId: "627544943347",
      appId: "1:627544943347:web:1dd804c943f1d65dc1a586"
    };
    const ADMIN_EMAIL = "admin@centri-estivi.app";
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const ref = (p) => db.ref("v2/" + p);

    // ── Colori ──
    function hexToRgb(hex){const h=hex.replace("#","");return{r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};}
    function rgba(hex,a){const{r,g,b}=hexToRgb(hex);return `rgba(${r},${g},${b},${a})`;}
    function relLum(hex){const{r,g,b}=hexToRgb(hex);const f=c=>{c/=255;return c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);};return 0.2126*f(r)+0.7152*f(g)+0.0722*f(b);}
    function shade(hex,pct){const{r,g,b}=hexToRgb(hex);const t=pct<0?0:255,p=Math.abs(pct);const m=c=>Math.round((t-c)*p+c);return `rgb(${m(r)},${m(g)},${m(b)})`;}
    function theme(base){const onGradient=relLum(base)>0.5?"#1c1917":"#ffffff";return{base,gradient:`linear-gradient(135deg, ${base} 0%, ${shade(base,-0.25)} 100%)`,onGradient,soft:rgba(base,0.15),accentText:shade(base,-0.4),dot:base};}
    const CENTERS = [
      { id:"marano",     name:"Marano",      sub:"Centro estivo", ...theme("#70AD47") },
      { id:"villaester", name:"Villa Ester", sub:"Centro estivo", ...theme("#ECD45A") },
      { id:"pasubio",    name:"Pasubio",     sub:"Centro estivo", ...theme("#009999") },
    ];
    const CATEGORIES = ["Beni di prima necessità","Materiale attività","Socializzazione","Altro"];

    // ── Date ──
    const isoLocal=(d)=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");return `${y}-${m}-${day}`;};
    const TODAY=isoLocal(new Date());
    const fmtIt=(iso)=>{const[y,m,d]=iso.split("-");return `${d}/${m}/${y}`;};
    const fmtItShort=(iso)=>{const[,m,d]=iso.split("-");return `${d}/${m}`;};
    const addDays=(iso,n)=>{const[y,m,d]=iso.split("-").map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+n);return isoLocal(dt);};
    const mondayOf=(iso)=>{const[y,m,d]=iso.split("-").map(Number);const dt=new Date(y,m-1,d);const dow=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-dow);return isoLocal(dt);};

    const timeOptions=(s,e)=>{const o=[];for(let h=s;h<=e;h++){for(const m of[0,30]){o.push(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);}}return o;};
    const ORE=timeOptions(0,23); // 00:00 – 23:30, scala 24h
    const DEF_IN="00:00", DEF_OUT="00:00";
    const DAYS=[{n:"Lunedì",s:"Lun"},{n:"Martedì",s:"Mar"},{n:"Mercoledì",s:"Mer"},{n:"Giovedì",s:"Gio"},{n:"Venerdì",s:"Ven"}];
    const initials=(f)=>f.split(" ").map(p=>p[0]?.toUpperCase()||"").join("").slice(0,3);
    const euro=(n)=>new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(n||0);
    const toMin=(t)=>{const[h,m]=t.split(":").map(Number);return h*60+m;};
    const calcOre=(i,o)=>{let d=toMin(o)-toMin(i);if(d<0)d+=1440;return Math.round(d/6)/10;};
    const dl=(name,csv)=>{const url=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));const a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);};
    const csvRows=(rows)=>rows.map(r=>r.map(c=>`"${String(c)}"`).join(";")).join("\n");

    // ── Icone ──
    const P = {
      users:<React.Fragment><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></React.Fragment>,
      clock:<React.Fragment><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></React.Fragment>,
      receipt:<React.Fragment><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M8 8h8"/><path d="M8 12h8"/></React.Fragment>,
      chevronLeft:<polyline points="15 18 9 12 15 6"/>,
      chevronRight:<polyline points="9 18 15 12 9 6"/>,
      plus:<React.Fragment><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></React.Fragment>,
      check:<polyline points="20 6 9 17 4 12"/>,
      x:<React.Fragment><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></React.Fragment>,
      wallet:<React.Fragment><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></React.Fragment>,
      arrowDR:<React.Fragment><polyline points="7 7 17 7 17 17"/><line x1="7" y1="7" x2="17" y2="17"/></React.Fragment>,
      shield:<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>,
      hardhat:<React.Fragment><path d="M2 18a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-1a6 6 0 0 0-6-6H8a6 6 0 0 0-6 6Z"/><path d="M10 5V4a2 2 0 0 1 4 0v1"/></React.Fragment>,
      sun:<React.Fragment><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="5" y1="5" x2="7" y2="7"/><line x1="17" y1="17" x2="19" y2="19"/><line x1="19" y1="5" x2="17" y2="7"/><line x1="7" y1="17" x2="5" y2="19"/></React.Fragment>,
      trash:<React.Fragment><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></React.Fragment>,
      save:<React.Fragment><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></React.Fragment>,
      download:<React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></React.Fragment>,
      calendar:<React.Fragment><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></React.Fragment>,
      logout:<React.Fragment><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></React.Fragment>,
      home:<React.Fragment><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></React.Fragment>,
      eye:<React.Fragment><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></React.Fragment>,
      eyeOff:<React.Fragment><path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c6.5 0 10 7 10 7a13 13 0 0 1-2.16 2.88"/><path d="M6.6 6.6A13 13 0 0 0 2 11s3.5 7 10 7a9 9 0 0 0 4.1-.94"/><line x1="2" y1="2" x2="22" y2="22"/></React.Fragment>,
    };
    function Icon({name, className, style}){
      return <svg className={className} style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{P[name]}</svg>;
    }

    // ── APP ──
    function App(){
      const [user,setUser]=useState(null);
      const [authReady,setAuthReady]=useState(false);
      const [data,setData]=useState(null);
      useEffect(()=>auth.onAuthStateChanged(u=>{setUser(u);setAuthReady(true);}),[]);
      useEffect(()=>{ if(!user)return; const r=ref(""); const cb=r.on("value",s=>setData(s.val()||{})); return ()=>r.off("value",cb); },[user]);
      if(!authReady) return <Splash text="Avvio…" />;
      if(!user) return <Login />;
      if(data===null) return <Splash text="Carico i dati…" />;
      const isDbAdmin = data.admins && data.admins[user.uid];
      const role = (isDbAdmin || user.email===ADMIN_EMAIL) ? "admin" : "educator";
      return <Main user={user} role={role} data={data} />;
    }
    function Splash({text}){ return <div className="min-h-screen bg-stone-200 flex items-center justify-center"><div className="text-stone-500 text-sm font-medium">{text}</div></div>; }

    // ── Login ──
    function Login(){
      const [email,setEmail]=useState(""),[pw,setPw]=useState(""),[show,setShow]=useState(false),[err,setErr]=useState(""),[busy,setBusy]=useState(false);
      const submit=()=>{ setErr("");setBusy(true); auth.signInWithEmailAndPassword(email.trim(),pw).catch(()=>{setErr("Email o password non corretti.");setBusy(false);}); };
      return (
        <div className="min-h-screen bg-stone-200 flex items-center justify-center p-6">
          <div className="w-full max-w-sm bg-white rounded-3xl shadow-xl p-7">
            <div className="h-14 w-14 rounded-2xl flex items-center justify-center mb-5" style={{background:CENTERS[2].gradient,color:"#fff"}}><Icon name="sun" className="h-7 w-7" /></div>
            <h1 className="text-xl font-bold text-stone-800">Centri Estivi</h1>
            <p className="text-sm text-stone-400 mb-6">ASP Parma · accedi per continuare</p>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="Email" className="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-stone-300" />
            <div className="relative mb-3">
              <input value={pw} onChange={e=>setPw(e.target.value)} type={show?"text":"password"} placeholder="Password" onKeyDown={e=>e.key==="Enter"&&submit()} className="w-full rounded-2xl border border-stone-200 px-4 py-3 pr-12 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
              <button onClick={()=>setShow(s=>!s)} className="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 active:text-stone-700"><Icon name={show?"eyeOff":"eye"} className="h-5 w-5" /></button>
            </div>
            {err && <p className="text-sm text-rose-500 mb-3">{err}</p>}
            <button onClick={submit} disabled={busy} className="w-full rounded-2xl py-3.5 font-semibold text-white bg-stone-800 active:scale-[0.99] disabled:opacity-50">{busy?"Accesso…":"Accedi"}</button>
          </div>
        </div>
      );
    }

    // ── Main ──
    function Main({user,role,data}){
      const [screen,setScreen]=useState("home"),[center,setCenter]=useState(null),[tab,setTab]=useState("presenze");
      const t=CENTERS.find(c=>c.id===center);
      const kidsOf=(cid,wk)=>Object.entries(data.weekRoster?.[cid]?.[wk]||{}).map(([id,v])=>({id,name:v.name}));
      const expArr=(cid)=>Object.entries(data.expenses?.[cid]||{}).map(([id,v])=>({id,...v}));
      const fundOf=(cid)=>data.funds?.[cid]||0;

      return (
        <div className="min-h-screen bg-stone-200 flex justify-center py-4">
          <div className="relative w-full max-w-md bg-stone-50 min-h-screen shadow-xl overflow-hidden">
            <div className="sticky top-0 z-10 bg-stone-50/90 backdrop-blur px-5 py-3 flex items-center justify-between border-b border-stone-100">
              <div className="flex items-center gap-2">
                <span className="font-bold text-stone-800 text-sm tracking-tight">Centri Estivi</span>
                {screen==="center" && <button onClick={()=>setScreen("home")} className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-stone-200 text-stone-600 active:bg-stone-300"><Icon name="home" className="h-3.5 w-3.5" /> Home</button>}
              </div>
              <div className="flex items-center gap-2">
                <span className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-stone-200 text-stone-600"><Icon name={role==="admin"?"shield":"hardhat"} className="h-3.5 w-3.5" />{role==="admin"?"Admin":"Educatore"}</span>
                <button onClick={()=>auth.signOut()} className="text-stone-400 active:text-stone-700 p-1"><Icon name="logout" className="h-4 w-4" /></button>
              </div>
            </div>

            {screen==="home" ? (
              <>
                <div className="px-5 pt-6 pb-2"><p className="text-sm font-medium text-stone-400">Buongiorno 👋</p><h1 className="text-2xl font-bold text-stone-800 tracking-tight">Dove lavori oggi?</h1></div>
                <div className="px-5 pt-3 space-y-4">
                  {CENTERS.map(c=>{
                    const wk=mondayOf(TODAY);
                    const kids=kidsOf(c.id,wk);
                    const presenti=kids.filter(p=>data.attendance?.[c.id]?.[wk]?.[p.id]?.[TODAY]).length;
                    const depTot=Object.values(data.deposits?.[c.id]||{}).reduce((s,d)=>s+(d.amount||0),0);
                    const saldo=fundOf(c.id)+depTot-expArr(c.id).reduce((s,e)=>s+(e.amount||0),0);
                    return (
                      <button key={c.id} onClick={()=>{setCenter(c.id);setTab("presenze");setScreen("center");}} style={{background:c.gradient,color:c.onGradient}} className="w-full text-left rounded-3xl p-5 shadow-lg active:scale-[0.98] transition-transform">
                        <div className="flex items-center justify-between">
                          <div><p className="text-xs font-semibold uppercase tracking-wider" style={{opacity:.7}}>{c.sub}</p><p className="text-2xl font-bold mt-0.5">{c.name}</p></div>
                          <div className="h-12 w-12 rounded-2xl flex items-center justify-center" style={{backgroundColor:c.onGradient==="#ffffff"?"rgba(255,255,255,.2)":"rgba(0,0,0,.08)"}}><Icon name="sun" className="h-6 w-6" /></div>
                        </div>
                        <div className="mt-4 flex gap-3 text-xs font-medium" style={{opacity:.85}}><span>{presenti} presenti oggi</span><span>·</span><span>{euro(saldo)} in cassa</span></div>
                      </button>
                    );
                  })}
                </div>
                <div className="px-5 pt-6 pb-4"><p className="text-xs text-stone-400 text-center">Centri Estivi · ASP Parma</p></div>
              </>
            ) : (
              <>
                <div className="px-5 pt-5 pb-4" style={{backgroundColor:t.soft}}>
                  <button onClick={()=>setScreen("home")} className="flex items-center gap-1 text-stone-500 text-sm font-medium mb-2 active:opacity-60"><Icon name="chevronLeft" className="h-4 w-4" /> Centri</button>
                  <div className="flex items-center gap-3"><span className="h-3 w-3 rounded-full" style={{backgroundColor:t.dot}} /><h1 className="text-2xl font-bold text-stone-800">{t.name}</h1></div>
                </div>
                <div className="px-5 pt-5 pb-28">
                  {tab==="presenze" && <Presenze center={center} role={role} data={data} t={t} />}
                  {tab==="ore" && <Ore center={center} role={role} data={data} t={t} />}
                  {tab==="spese" && <Spese center={center} role={role} user={user} data={data} expenses={expArr(center)} fund={fundOf(center)} t={t} />}
                </div>
                <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/95 backdrop-blur border-t border-stone-100">
                  <div className="flex">
                    {[{id:"presenze",label:"Presenze",icon:"users"},{id:"ore",label:"Ore",icon:"clock"},{id:"spese",label:"Spese",icon:"receipt"}].map(x=>{
                      const active=tab===x.id;
                      return <button key={x.id} onClick={()=>setTab(x.id)} className="flex-1 flex flex-col items-center gap-1 py-3" style={{color:active?t.accentText:undefined}}><Icon name={x.icon} className={"h-5 w-5 "+(active?"":"text-stone-400")} /><span className={"text-xs font-medium "+(active?"":"text-stone-400")}>{x.label}</span></button>;
                    })}
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ── Selettore settimana (con frecce e avviso settimana passata) ──
    function WeekPicker({week,setWeek,t}){
      const cur=mondayOf(TODAY);
      const isCur=week===cur;
      return (
        <div className="mb-4">
          <div className="flex items-center gap-2 bg-white rounded-2xl p-2 shadow-sm">
            <button onClick={()=>setWeek(addDays(week,-7))} className="h-10 w-10 rounded-xl bg-stone-100 text-stone-600 flex items-center justify-center active:scale-95 shrink-0"><Icon name="chevronLeft" className="h-5 w-5" /></button>
            <div className="flex-1 min-w-0 text-center">
              <p className="text-xs text-stone-400">Settimana</p>
              <input type="date" value={week} onChange={e=>setWeek(mondayOf(e.target.value))} className="text-sm font-semibold text-stone-800 bg-transparent focus:outline-none text-center w-full" />
              <p className="text-xs font-medium" style={{color:t.accentText}}>{fmtItShort(week)}–{fmtItShort(addDays(week,4))}</p>
            </div>
            <button onClick={()=>setWeek(addDays(week,7))} className="h-10 w-10 rounded-xl bg-stone-100 text-stone-600 flex items-center justify-center active:scale-95 shrink-0"><Icon name="chevronRight" className="h-5 w-5" /></button>
          </div>
          {!isCur && (
            <button onClick={()=>setWeek(cur)} className="mt-2 w-full rounded-xl py-2 text-xs font-semibold bg-amber-100 text-amber-800 active:bg-amber-200">
              Stai guardando un'altra settimana · torna a quella corrente
            </button>
          )}
        </div>
      );
    }

    // ── PRESENZE (griglia ragazzi × giorni) ──
    function Presenze({center,role,data,t}){
      const [week,setWeek]=useState(mondayOf(TODAY));
      const [newName,setNewName]=useState(""),[msg,setMsg]=useState("");
      const kids=Object.entries(data.weekRoster?.[center]?.[week]||{}).map(([id,v])=>({id,name:v.name}));
      const days=[0,1,2,3,4].map(i=>({...DAYS[i],iso:addDays(week,i)}));
      const isPres=(kid,iso)=>!!data.attendance?.[center]?.[week]?.[kid]?.[iso];
      const toggle=(kid,iso)=>{const r=ref(`attendance/${center}/${week}/${kid}/${iso}`); isPres(kid,iso)?r.remove():r.set(true);};

      const add=()=>{ if(!newName.trim())return; if(kids.length>=13){setMsg("Massimo 13 ragazzi.");return;} ref(`weekRoster/${center}/${week}`).push({name:newName.trim()}); setNewName("");setMsg(""); };
      const remove=(id)=>ref(`weekRoster/${center}/${week}/${id}`).remove();
      const copyPrev=()=>{ for(let i=1;i<=12;i++){const prev=addDays(week,-7*i);const list=data.weekRoster?.[center]?.[prev];if(list){Object.values(list).map(v=>v.name).slice(0,13).forEach(n=>ref(`weekRoster/${center}/${week}`).push({name:n}));setMsg("Copiata dalla settimana del "+fmtItShort(prev)+".");return;}} setMsg("Nessuna lista nelle settimane precedenti."); };

      const scarica=()=>{
        const rows=[["Ragazzo",...days.map(d=>d.s+" "+fmtItShort(d.iso)),"Tot presenze"]];
        kids.forEach(k=>{ const cells=days.map(d=>isPres(k.id,d.iso)?"P":"A"); rows.push([k.name,...cells,cells.filter(c=>c==="P").length]); });
        dl(`ragazzi_${center}_${week}.csv`, csvRows(rows));
      };
      const esportaOver14=()=>{
        const aoa=[["Presenze Over 14 — settimana "+fmtIt(week)],[],
          ["N","NOME RAGAZZI","Centro","Pres/Ass","",...days.map(d=>fmtItShort(d.iso)),"TOT"]];
        let n=0;
        CENTERS.forEach(c=>{
          Object.entries(data.weekRoster?.[c.id]?.[week]||{}).forEach(([kid,v])=>{
            n++;
            const pres=days.map(d=>!!data.attendance?.[c.id]?.[week]?.[kid]?.[d.iso]);
            aoa.push([n,v.name,c.name,"Presenza","",...pres.map(p=>p?"P":""),pres.filter(Boolean).length]);
            aoa.push(["","","","Assenza","",...pres.map(p=>p?"":"A"),pres.filter(p=>!p).length]);
          });
        });
        const ws=XLSX.utils.aoa_to_sheet(aoa);
        const wb=XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,ws,"Presenze");
        XLSX.writeFile(wb,`presenze_Over14_${week}.xlsx`);
      };

      return (
        <div>
          <WeekPicker week={week} setWeek={setWeek} t={t} />
          <h2 className="text-lg font-bold text-stone-800 mb-1">Presenze ragazzi</h2>
          <p className="text-xs text-stone-400 mb-3">Tocca le caselle per segnare presente/assente, giorno per giorno.</p>

          {kids.length===0 ? (
            <p className="text-sm text-stone-400 text-center py-6">{role==="admin"?"Nessun ragazzo per questa settimana. Copiala dalla scorsa o aggiungili qui sotto.":"L'amministratore non ha ancora inserito la lista ragazzi di questa settimana."}</p>
          ) : (
            <div className="bg-white rounded-2xl shadow-sm p-3 overflow-hidden">
              <div className="flex items-center gap-1 mb-2">
                <div className="w-12 shrink-0"></div>
                {days.map(d=>(<div key={d.iso} className="flex-1 text-center"><p className="text-xs font-bold text-stone-600">{d.s}</p><p className="text-[10px] text-stone-400">{fmtItShort(d.iso)}</p></div>))}
              </div>
              {kids.map(k=>(
                <div key={k.id} className="flex items-center gap-1 py-1 border-t border-stone-100">
                  <div className="w-12 shrink-0 flex items-center justify-center"><span className="h-8 w-8 rounded-full flex items-center justify-center font-bold text-xs" style={{backgroundColor:t.soft,color:t.accentText}}>{initials(k.name)}</span></div>
                  {days.map(d=>{const p=isPres(k.id,d.iso);return (<button key={d.iso} onClick={()=>toggle(k.id,d.iso)} className={"flex-1 h-10 mx-0.5 rounded-lg flex items-center justify-center "+(p?"bg-emerald-500 text-white":"bg-stone-100 text-stone-300")}><Icon name={p?"check":"x"} className="h-4 w-4" /></button>);})}
                </div>
              ))}
            </div>
          )}

          {role==="admin" && (
            <div className="mt-5 bg-white rounded-2xl shadow-sm p-4">
              <div className="flex items-baseline justify-between mb-2"><p className="text-sm font-bold text-stone-700">Lista ragazzi (settimana)</p><span className="text-xs text-stone-400">{kids.length}/13</span></div>
              <div className="space-y-1 mb-3">
                {kids.map(k=>(<div key={k.id} className="flex items-center gap-2 text-sm text-stone-700"><span className="flex-1 truncate">{k.name}</span><button onClick={()=>remove(k.id)} className="text-stone-300 active:text-rose-500"><Icon name="trash" className="h-4 w-4" /></button></div>))}
              </div>
              <div className="flex gap-2">
                <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Nome e cognome ragazzo" onKeyDown={e=>e.key==="Enter"&&add()} className="flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
                <button onClick={add} className="h-12 w-12 rounded-2xl bg-stone-800 text-white flex items-center justify-center active:scale-95"><Icon name="plus" className="h-5 w-5" /></button>
              </div>
              {kids.length===0 && <button onClick={copyPrev} className="mt-2 w-full rounded-2xl py-3 font-semibold text-stone-700 bg-stone-100 flex items-center justify-center gap-2 active:scale-[0.99]"><Icon name="calendar" className="h-5 w-5" /> Copia dalla settimana scorsa</button>}
              {msg && <p className="mt-2 text-xs text-stone-500 text-center">{msg}</p>}
              <button onClick={scarica} className="mt-3 w-full rounded-2xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.99]" style={{background:t.gradient,color:t.onGradient}}><Icon name="download" className="h-5 w-5" /> Scarica ragazzi (settimana)</button>
              <button onClick={esportaOver14} className="mt-2 w-full rounded-2xl py-3 font-semibold text-stone-700 bg-stone-100 flex items-center justify-center gap-2 active:scale-[0.99]"><Icon name="download" className="h-5 w-5" /> Esporta Excel per file Over 14 (tutti i centri)</button>
            </div>
          )}
        </div>
      );
    }

    // ── ORE (educatori: orari + ore extra) ──
    function Ore({center,role,data,t}){
      const [week,setWeek]=useState(mondayOf(TODAY));
      const [eduId,setEduId]=useState("");
      const [newName,setNewName]=useState(""),[msg,setMsg]=useState("");
      const [exOre,setExOre]=useState(""),[exMot,setExMot]=useState("");
      const edus=Object.entries(data.weekEducators?.[center]?.[week]||{}).map(([id,v])=>({id,name:v.name}));
      const days=[0,1,2,3,4].map(i=>({...DAYS[i],iso:addDays(week,i)}));
      const sel=edus.find(e=>e.id===eduId);

      const getH=(iso)=>data.hours?.[center]?.[week]?.[eduId]?.[iso]||{in:DEF_IN,out:DEF_OUT};
      const setH=(iso,field,val)=>{const cur=getH(iso);ref(`hours/${center}/${week}/${eduId}/${iso}`).set({...cur,[field]:val});};
      const extra=sel?Object.entries(data.extra?.[center]?.[week]?.[eduId]||{}).map(([id,v])=>({id,...v})):[];
      const addExtra=()=>{const n=parseFloat(String(exOre).replace(",","."));if(isNaN(n)||!exMot.trim())return;ref(`extra/${center}/${week}/${eduId}`).push({ore:n,motivo:exMot.trim()});setExOre("");setExMot("");};
      const remExtra=(id)=>ref(`extra/${center}/${week}/${eduId}/${id}`).remove();

      const addEdu=()=>{ if(!newName.trim())return; if(edus.length>=13){setMsg("Massimo 13 educatori.");return;} ref(`weekEducators/${center}/${week}`).push({name:newName.trim()}); setNewName("");setMsg(""); };
      const removeEdu=(id)=>{ ref(`weekEducators/${center}/${week}/${id}`).remove(); if(eduId===id)setEduId(""); };
      const copyPrev=()=>{ for(let i=1;i<=12;i++){const prev=addDays(week,-7*i);const list=data.weekEducators?.[center]?.[prev];if(list){Object.values(list).map(v=>v.name).slice(0,13).forEach(n=>ref(`weekEducators/${center}/${week}`).push({name:n}));setMsg("Copiata dalla settimana del "+fmtItShort(prev)+".");return;}} setMsg("Nessuna lista nelle settimane precedenti."); };

      const scarica=()=>{
        const rows=[["Educatore","Tipo","Giorno / Motivo","Data","Entrata","Uscita","Ore"]];
        edus.forEach(ed=>{
          let tot=0;
          days.forEach(d=>{const h=data.hours?.[center]?.[week]?.[ed.id]?.[d.iso]||{in:DEF_IN,out:DEF_OUT};const o=calcOre(h.in,h.out);tot+=o;rows.push([ed.name,"Ordinario",d.n,fmtIt(d.iso),h.in,h.out,String(o).replace(".",",")]);});
          const ex=Object.values(data.extra?.[center]?.[week]?.[ed.id]||{});
          ex.forEach(e=>{tot+=(e.ore||0);rows.push([ed.name,"Extra",e.motivo,"","","",String(e.ore).replace(".",",")]);});
          rows.push([ed.name,"TOTALE","","","","",String(Math.round(tot*10)/10).replace(".",",")]);
        });
        dl(`educatori_${center}_${week}.csv`, csvRows(rows));
      };

      return (
        <div>
          <WeekPicker week={week} setWeek={setWeek} t={t} />
          <h2 className="text-lg font-bold text-stone-800 mb-3">Ore educatori</h2>

          {edus.length===0 ? (
            <p className="text-sm text-stone-400 text-center py-6">{role==="admin"?"Nessun educatore per questa settimana. Copiala dalla scorsa o aggiungili qui sotto.":"L'amministratore non ha ancora inserito la lista educatori di questa settimana."}</p>
          ) : (
            <>
              <label className="block mb-3">
                <span className="block text-xs text-stone-400 mb-1">Educatore</span>
                <select value={eduId} onChange={e=>setEduId(e.target.value)} className="w-full rounded-2xl border border-stone-200 bg-white px-4 py-3 text-sm font-medium text-stone-800 focus:outline-none focus:ring-2 focus:ring-stone-300">
                  <option value="">— scegli dalla lista —</option>
                  {edus.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
                </select>
              </label>

              {sel && (
                <>
                  <div className="space-y-2">
                    {days.map(d=>{const h=getH(d.iso);return (
                      <div key={d.iso} className="bg-white rounded-2xl p-3 shadow-sm">
                        <div className="flex items-baseline justify-between mb-2"><p className="text-sm font-semibold text-stone-700">{d.n}</p><p className="text-xs font-medium" style={{color:t.accentText}}>{fmtItShort(d.iso)} · {calcOre(h.in,h.out)} h</p></div>
                        <div className="flex items-center gap-2">
                          <Field label="Entrata" value={h.in} onChange={v=>setH(d.iso,"in",v)} options={ORE} />
                          <span className="text-stone-300 mt-5">→</span>
                          <Field label="Uscita" value={h.out} onChange={v=>setH(d.iso,"out",v)} options={ORE} />
                        </div>
                      </div>
                    );})}
                  </div>

                  <div className="mt-4 bg-white rounded-2xl p-4 shadow-sm">
                    <p className="text-sm font-bold text-stone-700 mb-2">Ore extra (equipe o altro)</p>
                    <div className="space-y-1 mb-3">
                      {extra.length===0 && <p className="text-xs text-stone-400">Nessuna ora extra inserita.</p>}
                      {extra.map(e=>(<div key={e.id} className="flex items-center gap-2 text-sm text-stone-700"><span className="flex-1 truncate">{e.motivo}</span><span className="font-semibold">{e.ore} h</span><button onClick={()=>remExtra(e.id)} className="text-stone-300 active:text-rose-500"><Icon name="trash" className="h-4 w-4" /></button></div>))}
                    </div>
                    <div className="flex gap-2">
                      <input value={exOre} onChange={e=>setExOre(e.target.value)} inputMode="decimal" placeholder="Ore" className="w-20 rounded-xl border border-stone-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
                      <input value={exMot} onChange={e=>setExMot(e.target.value)} placeholder="Motivo (es. equipe)" onKeyDown={e=>e.key==="Enter"&&addExtra()} className="flex-1 rounded-xl border border-stone-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
                      <button onClick={addExtra} className="h-10 w-10 rounded-xl bg-stone-800 text-white flex items-center justify-center active:scale-95"><Icon name="plus" className="h-5 w-5" /></button>
                    </div>
                  </div>
                  <p className="mt-2 text-xs text-stone-400 text-center">Le ore si salvano da sole appena le modifichi.</p>
                </>
              )}
            </>
          )}

          {role==="admin" && (
            <div className="mt-5 bg-white rounded-2xl shadow-sm p-4">
              <div className="flex items-baseline justify-between mb-2"><p className="text-sm font-bold text-stone-700">Lista educatori (settimana)</p><span className="text-xs text-stone-400">{edus.length}/13</span></div>
              <div className="space-y-1 mb-3">
                {edus.map(e=>(<div key={e.id} className="flex items-center gap-2 text-sm text-stone-700"><span className="flex-1 truncate">{e.name}</span><button onClick={()=>removeEdu(e.id)} className="text-stone-300 active:text-rose-500"><Icon name="trash" className="h-4 w-4" /></button></div>))}
              </div>
              <div className="flex gap-2">
                <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Nome e cognome educatore" onKeyDown={e=>e.key==="Enter"&&addEdu()} className="flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
                <button onClick={addEdu} className="h-12 w-12 rounded-2xl bg-stone-800 text-white flex items-center justify-center active:scale-95"><Icon name="plus" className="h-5 w-5" /></button>
              </div>
              {edus.length===0 && <button onClick={copyPrev} className="mt-2 w-full rounded-2xl py-3 font-semibold text-stone-700 bg-stone-100 flex items-center justify-center gap-2 active:scale-[0.99]"><Icon name="calendar" className="h-5 w-5" /> Copia dalla settimana scorsa</button>}
              {msg && <p className="mt-2 text-xs text-stone-500 text-center">{msg}</p>}
              <button onClick={scarica} className="mt-3 w-full rounded-2xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.99]" style={{background:t.gradient,color:t.onGradient}}><Icon name="download" className="h-5 w-5" /> Scarica educatori (settimana)</button>
            </div>
          )}
        </div>
      );
    }
    function Field({label,value,onChange,options}){
      return (
        <label className="flex-1"><span className="block text-xs text-stone-400 mb-1">{label}</span>
          <select value={value} onChange={e=>onChange(e.target.value)} className="w-full rounded-xl border border-stone-200 bg-stone-50 px-3 py-2.5 text-sm font-medium text-stone-800 focus:outline-none focus:ring-2 focus:ring-stone-300">{options.map(o=><option key={o}>{o}</option>)}</select>
        </label>
      );
    }

    // ── SPESE / CASSA (storico settimanale, fondi aperti a tutti) ──
    function Spese({center,role,user,data,expenses,fund,t}){
      const [desc,setDesc]=useState(""),[amount,setAmount]=useState(""),[cat,setCat]=useState(CATEGORIES[0]),[addFund,setAddFund]=useState("");
      const [showHist,setShowHist]=useState(false);
      const [week,setWeek]=useState(mondayOf(TODAY));

      // depositi datati + eventuale fondo storico (numero salvato in precedenza)
      const deposits=Object.entries(data.deposits?.[center]||{}).map(([id,v])=>({id,...v}));
      const legacy=fund||0;
      const totFondo=legacy+deposits.reduce((s,d)=>s+(d.amount||0),0);
      const speso=expenses.reduce((s,e)=>s+(e.amount||0),0);
      const saldo=totFondo-speso;

      const add=()=>{const n=parseFloat(amount.replace(",","."));if(!desc.trim()||isNaN(n))return;ref(`expenses/${center}`).push({desc:desc.trim(),amount:n,cat,date:TODAY,by:user.email});setDesc("");setAmount("");setCat(CATEGORIES[0]);};
      const remove=(id)=>ref(`expenses/${center}/${id}`).remove();
      const addToFund=()=>{const n=parseFloat(addFund.replace(",","."));if(isNaN(n))return;ref(`deposits/${center}`).push({amount:n,date:TODAY,by:user.email});setAddFund("");};
      const remDep=(id)=>ref(`deposits/${center}/${id}`).remove();

      // dati della settimana selezionata (storico)
      const lun=week, dom=addDays(week,6);
      const inWeek=(d)=>d&&d>=lun&&d<=dom;
      const expWeek=expenses.filter(e=>inWeek(e.date)).sort((a,b)=>a.date<b.date?-1:1);
      const depWeek=deposits.filter(d=>inWeek(d.date)).sort((a,b)=>a.date<b.date?-1:1);
      const totExpWeek=expWeek.reduce((s,e)=>s+(e.amount||0),0);
      const totDepWeek=depWeek.reduce((s,d)=>s+(d.amount||0),0);

      const scaricaSettimana=()=>{
        const rows=[["CASSA "+center.toUpperCase()+" — settimana "+fmtIt(lun)+" / "+fmtIt(dom)],[],
                    ["Tipo","Data","Descrizione","Categoria","Importo"]];
        depWeek.forEach(d=>rows.push(["Fondo consegnato",fmtIt(d.date),d.by||"","",String(d.amount).replace(".",",")]));
        expWeek.forEach(e=>rows.push(["Spesa",fmtIt(e.date),e.desc,e.cat,String(e.amount).replace(".",",")]));
        rows.push([]);
        rows.push(["","","","Totale consegnato",String(totDepWeek).replace(".",",")]);
        rows.push(["","","","Totale speso",String(totExpWeek).replace(".",",")]);
        rows.push(["","","","Differenza settimana",String(Math.round((totDepWeek-totExpWeek)*100)/100).replace(".",",")]);
        rows.push(["","","","SALDO CASSA ATTUALE",String(Math.round(saldo*100)/100).replace(".",",")]);
        dl(`cassa_${center}_${lun}.csv`, csvRows(rows));
      };

      return (
        <div>
          <div className="rounded-3xl p-5 mb-5 shadow-lg" style={{background:t.gradient,color:t.onGradient}}>
            <div className="flex items-center gap-2 text-xs font-semibold uppercase tracking-wider" style={{opacity:.8}}><Icon name="wallet" className="h-4 w-4" /> Cassa del centro</div>
            <p className="text-3xl font-bold mt-1">{euro(saldo)}</p>
            <div className="mt-3 flex gap-4 text-xs font-medium" style={{opacity:.85}}><span>Consegnato {euro(totFondo)}</span><span className="flex items-center gap-1"><Icon name="arrowDR" className="h-3.5 w-3.5" /> Speso {euro(speso)}</span></div>
          </div>

          {/* Fondi: ora aperti a TUTTI */}
          <div className="mb-6">
            <p className="text-sm font-semibold text-stone-700 mb-2">Registra soldi consegnati</p>
            <div className="flex gap-2">
              <input value={addFund} onChange={e=>setAddFund(e.target.value)} inputMode="decimal" placeholder="Importo €" onKeyDown={e=>e.key==="Enter"&&addToFund()} className="flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
              <button onClick={addToFund} className="px-4 rounded-2xl bg-stone-800 text-white text-sm font-semibold active:scale-95">Aggiungi</button>
            </div>
            {deposits.length>0 && (
              <div className="mt-3 bg-white rounded-2xl p-3 shadow-sm space-y-1">
                {deposits.slice().sort((a,b)=>a.date<b.date?1:-1).slice(0,5).map(d=>(
                  <div key={d.id} className="flex items-center gap-2 text-sm text-stone-700">
                    <span className="flex-1 text-xs text-stone-400">{d.date?fmtIt(d.date):""}</span>
                    <span className="font-semibold">{euro(d.amount)}</span>
                    {role==="admin" && <button onClick={()=>remDep(d.id)} className="text-stone-300 active:text-rose-500"><Icon name="trash" className="h-4 w-4" /></button>}
                  </div>
                ))}
              </div>
            )}
          </div>

          <h2 className="text-lg font-bold text-stone-800 mb-3">Spese</h2>
          <div className="bg-white rounded-2xl p-4 shadow-sm space-y-3 mb-4">
            <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Descrizione" className="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
            <div className="flex gap-2">
              <input value={amount} onChange={e=>setAmount(e.target.value)} inputMode="decimal" placeholder="€ 0,00" className="w-28 rounded-xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
              <select value={cat} onChange={e=>setCat(e.target.value)} className="flex-1 rounded-xl border border-stone-200 bg-stone-50 px-3 py-3 text-sm font-medium text-stone-800 focus:outline-none focus:ring-2 focus:ring-stone-300">{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select>
            </div>
            <button onClick={add} style={{background:t.gradient,color:t.onGradient}} className="w-full rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.99]"><Icon name="plus" className="h-5 w-5" /> Aggiungi spesa</button>
          </div>
          <div className="space-y-2">
            {expenses.length===0 && <p className="text-sm text-stone-400 text-center py-6">Nessuna spesa registrata.</p>}
            {expenses.slice().sort((a,b)=>(a.date||"")<(b.date||"")?1:-1).map(e=>(<div key={e.id} className="flex items-center gap-3 bg-white rounded-2xl p-3 shadow-sm"><div className="flex-1 min-w-0"><p className="font-medium text-stone-800 truncate">{e.desc}</p><p className="text-xs text-stone-400">{e.cat}{e.date?` · ${fmtIt(e.date)}`:""}</p></div><p className="font-semibold text-stone-800">{euro(e.amount)}</p>{role==="admin" && <button onClick={()=>remove(e.id)} className="text-stone-300 active:text-rose-500"><Icon name="trash" className="h-4 w-4" /></button>}</div>))}
          </div>

          {/* Storico settimanale — solo Admin */}
          {role==="admin" && (
            <div className="mt-6">
              <button onClick={()=>setShowHist(s=>!s)} className="w-full rounded-2xl py-3 font-semibold text-stone-700 bg-stone-100 flex items-center justify-center gap-2 active:scale-[0.99]">
                <Icon name="calendar" className="h-5 w-5" /> {showHist?"Nascondi storico settimane":"Storico settimane"}
              </button>
              {showHist && (
                <div className="mt-3">
                  <WeekPicker week={week} setWeek={setWeek} t={t} />
                  <div className="bg-white rounded-2xl p-4 shadow-sm">
                    <p className="text-sm font-bold text-stone-700 mb-2">Movimenti {fmtItShort(lun)}–{fmtItShort(addDays(lun,6))}</p>
                    {depWeek.length===0 && expWeek.length===0 && <p className="text-xs text-stone-400 py-2">Nessun movimento in questa settimana.</p>}
                    {depWeek.map(d=>(<div key={d.id} className="flex items-center gap-2 text-sm py-1 border-b border-stone-50"><span className="text-xs text-stone-400 w-16">{fmtItShort(d.date)}</span><span className="flex-1 text-emerald-700">Fondo consegnato</span><span className="font-semibold text-emerald-700">+{euro(d.amount)}</span></div>))}
                    {expWeek.map(e=>(<div key={e.id} className="flex items-center gap-2 text-sm py-1 border-b border-stone-50"><span className="text-xs text-stone-400 w-16">{fmtItShort(e.date)}</span><span className="flex-1 truncate text-stone-700">{e.desc}</span><span className="font-semibold text-stone-800">−{euro(e.amount)}</span></div>))}
                    <div className="mt-3 pt-2 flex justify-between text-sm font-bold text-stone-800"><span>Differenza settimana</span><span>{euro(totDepWeek-totExpWeek)}</span></div>
                    <p className="text-xs text-stone-400 mt-1">Consegnato {euro(totDepWeek)} · Speso {euro(totExpWeek)}</p>
                  </div>
                  <button onClick={scaricaSettimana} className="mt-3 w-full rounded-2xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.99]" style={{background:t.gradient,color:t.onGradient}}><Icon name="download" className="h-5 w-5" /> Scarica cassa di questa settimana</button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
