<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Centri Estivi ASP Parma 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:15px;-webkit-text-size-adjust:100%;}
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:1.5rem;background:#f5f5f0;}
.login-card{background:#fff;border-radius:16px;border:0.5px solid #e0e0d8;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%;max-width:340px;}
.login-logo{font-size:18px;font-weight:500;color:#1a1a1a;text-align:center;line-height:1.4;}
.login-sub{font-size:13px;color:#888;text-align:center;}
.login-card input{width:100%;padding:11px 14px;border:0.5px solid #ccc;border-radius:8px;font-size:16px;background:#fff;color:#1a1a1a;outline:none;}
.login-card input:focus{border-color:#1D9E75;}
.login-card button.main-btn{width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:500;}
.pwd-wrap{position:relative;width:100%;}
.pwd-wrap input{padding-right:44px;}
.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:18px;padding:0;display:flex;align-items:center;}
#login-error{color:#E24B4A;font-size:13px;text-align:center;display:none;}
#db-status{font-size:12px;color:#888;text-align:center;}
#setup-box{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:14px;margin-top:8px;width:100%;max-width:340px;display:none;}
#setup-box .setup-title{font-size:13px;font-weight:500;margin-bottom:8px;color:#5B2D8E;}
#main-app{display:none;min-height:100vh;}
.top-bar{background:#fff;border-bottom:0.5px solid #e0e0d8;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.top-bar .title{font-size:14px;font-weight:500;color:#1a1a1a;flex:1;}
.top-bar .right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;flex-shrink:0;}
.sync-dot.saving{background:#EF9F27;}
.user-badge{font-size:12px;color:#888;background:#f5f5f0;padding:3px 8px;border-radius:20px;}
.logout-btn{font-size:13px;color:#888;cursor:pointer;border:0.5px solid #e0e0d8;padding:5px 10px;border-radius:8px;background:none;}
.area-tabs{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:0.5px solid #e0e0d8;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.area-tabs::-webkit-scrollbar{display:none;}
.area-tab{padding:7px 14px;border-radius:20px;border:0.5px solid #ccc;background:#f5f5f0;color:#888;cursor:pointer;font-size:13px;white-space:nowrap;flex-shrink:0;}
.area-tab.active{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.section-tabs{display:flex;gap:6px;padding:8px 16px;background:#f5f5f0;border-bottom:0.5px solid #e0e0d8;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.section-tabs::-webkit-scrollbar{display:none;}
.section-tab{padding:5px 12px;border-radius:8px;border:0.5px solid #e0e0d8;background:#fff;color:#888;cursor:pointer;font-size:12px;white-space:nowrap;flex-shrink:0;}
.section-tab.active{color:#1D9E75;border-color:#1D9E75;font-weight:500;}
.content-area{padding:14px 16px;padding-bottom:40px;}
.week-tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.week-tabs::-webkit-scrollbar{display:none;}
.week-tab{padding:5px 10px;border-radius:8px;border:0.5px solid #e0e0d8;background:#fff;color:#888;cursor:pointer;font-size:11px;white-space:nowrap;flex-shrink:0;}
.week-tab.active{background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5;}
.table-wrap{overflow-x:auto;border-radius:8px;border:0.5px solid #e0e0d8;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;}
th{background:#f5f5f0;padding:8px;text-align:left;border:0.5px solid #e0e0d8;font-weight:500;color:#888;white-space:nowrap;}
td{border:0.5px solid #e0e0d8;padding:1px 3px;}
td input[type=text]{width:100%;border:none;background:transparent;padding:6px 5px;font-size:12px;color:#1a1a1a;outline:none;min-width:55px;}
td input[type=text]:focus{background:#E1F5EE;border-radius:3px;}
.pa-cell{text-align:center;}
.pa-btn{width:36px;height:30px;border:0.5px solid #e0e0d8;border-radius:4px;background:#f5f5f0;cursor:pointer;font-size:12px;color:#888;touch-action:manipulation;}
.pa-btn.present{background:#EAF3DE;color:#3B6D11;border-color:#97C459;font-weight:500;}
.pa-btn.absent{background:#FCEBEB;color:#A32D2D;border-color:#F09595;font-weight:500;}
.notes-area{margin-top:10px;background:#fff;border:0.5px solid #e0e0d8;border-radius:8px;padding:10px;}
.notes-area label{font-size:12px;color:#888;display:block;margin-bottom:5px;}
.notes-area textarea{width:100%;min-height:70px;border:none;background:transparent;font-size:13px;color:#1a1a1a;resize:vertical;outline:none;font-family:inherit;}
.action-bar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.btn{padding:9px 14px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;text-decoration:none;touch-action:manipulation;}
.btn.green{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.btn.red{background:#E24B4A;color:#fff;border-color:#E24B4A;}
.btn.small{padding:6px 10px;font-size:12px;}
.card{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.card.urgent{border-left:3px solid #EF9F27;border-radius:0 12px 12px 0;}
.card.richiesta{border-left:3px solid #4A90D9;border-radius:0 12px 12px 0;}
.card .meta{font-size:11px;color:#888;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}
.card .testo{font-size:13px;color:#1a1a1a;line-height:1.6;}
.inner-tabs{display:flex;gap:6px;margin-bottom:14px;}
.inner-tab{padding:6px 14px;border-radius:8px;border:0.5px solid #e0e0d8;background:#f5f5f0;color:#888;cursor:pointer;font-size:13px;}
.inner-tab.active{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.cassa-totals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.cassa-total{background:#fff;border:0.5px solid #e0e0d8;border-radius:8px;padding:10px 12px;}
.cassa-total .lbl{font-size:11px;color:#888;margin-bottom:2px;}
.cassa-total .val{font-size:17px;font-weight:600;color:#1D9E75;}
.cassa-total .val.neg{color:#E24B4A;}
.form-group{margin-bottom:10px;}
.form-group label{font-size:12px;color:#888;display:block;margin-bottom:4px;}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 11px;border:0.5px solid #ccc;border-radius:8px;font-size:15px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none;-webkit-appearance:none;}
.form-group input:focus,.form-group textarea:focus{border-color:#1D9E75;}
.form-group textarea{min-height:90px;resize:vertical;}
.form-pwd-wrap{position:relative;}
.form-pwd-wrap input{padding-right:44px;}
.form-pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:18px;padding:0;display:flex;align-items:center;}
.section-title{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:12px;padding-bottom:8px;border-bottom:0.5px solid #e0e0d8;}
.empty-state{font-size:13px;color:#888;padding:30px 0;text-align:center;}
.info-box{background:#f5f5f0;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#888;line-height:1.6;}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
.badge-urgent{background:#FAEEDA;color:#854F0B;}
.badge-richiesta{background:#E0EEFA;color:#1A5FA8;}
.badge-admin{background:#E8E0F5;color:#5B2D8E;}
.admin-user-card{background:#fff;border:0.5px solid #e0e0d8;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.turni-card{background:#fff;border:0.5px solid #e0e0d8;border-radius:8px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
@media(max-width:380px){.cassa-totals{grid-template-columns:1fr 1fr;}.cassa-totals .cassa-total:last-child{grid-column:1/-1;}}

input[type=text],input[type=password],input[type=number],textarea,select{font-size:16px!important;}
.btn{min-height:40px;}
.pa-btn{width:40px;height:36px;font-size:13px;}
.content-area{padding:12px 12px 70px 12px;}
html{-webkit-overflow-scrolling:touch;}
.btn:active,.area-tab:active,.section-tab:active,.week-tab:active{opacity:0.7;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <img id="ce-logo" src="" style="width:150px;height:150px;object-fit:contain;margin-bottom:4px;">
    <div class="login-sub" style="font-size:13px;color:#555;">Accesso riservato agli operatori</div>
    <input type="text" id="login-username" placeholder="Username" autocomplete="username" autocapitalize="none" autocorrect="off"/>
    <div class="pwd-wrap">
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password"/>
      <button class="pwd-toggle" onclick="togglePwdVisibility('login-password',this)" type="button"><i class="ti ti-eye"></i></button>
    </div>
    <button class="main-btn" onclick="doLogin()">Accedi</button>
    <div id="login-error">Username o password errati</div>
    <div id="db-status">Connessione...</div>
  </div>
  <div id="setup-box">
    <div class="setup-title"><i class="ti ti-shield" style="margin-right:4px;"></i>Primo accesso — Crea account Admin</div>
    <div style="font-size:12px;color:#888;margin-bottom:10px;">Questo box appare solo la prima volta.</div>
    <div style="margin-bottom:8px;"><input type="text" id="setup-uname" placeholder="Username admin" autocapitalize="none" style="width:100%;padding:9px 11px;border:0.5px solid #ccc;border-radius:8px;font-size:14px;"></div>
    <div style="position:relative;margin-bottom:8px;">
      <input type="password" id="setup-pwd" placeholder="Password admin" style="width:100%;padding:9px 40px 9px 11px;border:0.5px solid #ccc;border-radius:8px;font-size:14px;">
      <button class="pwd-toggle" onclick="togglePwdVisibility('setup-pwd',this)" type="button" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);"><i class="ti ti-eye"></i></button>
    </div>
    <button class="btn green" style="width:100%;justify-content:center;" onclick="createAdminAccount()"><i class="ti ti-user-plus"></i> Crea account admin</button>
    <div id="setup-msg" style="font-size:12px;margin-top:8px;display:none;"></div>
  </div>
</div>

<div id="main-app">
  <div class="top-bar">
    <div class="title"><img id="topbar-logo" src="" style="height:26px;width:26px;object-fit:contain;margin-right:6px;vertical-align:middle;border-radius:4px;">Centri Estivi 2026</div>
    <div class="right">
      <div class="sync-dot" id="sync-dot"></div>
      <span class="user-badge" id="user-badge"></span>
      <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout"></i></button>
    </div>
  </div>
  <div class="area-tabs" id="area-tabs">
    <div class="area-tab active" onclick="switchArea('villa')"><i class="ti ti-building"></i> Villa Ester</div>
    <div class="area-tab" onclick="switchArea('marano')"><i class="ti ti-tree"></i> Marano</div>
    <div class="area-tab" onclick="switchArea('appartamento')"><i class="ti ti-home"></i> Appartamento</div>
    <div class="area-tab" id="admin-tab" style="display:none;background:#E8E0F5;color:#5B2D8E;border-color:#C4B0E8;" onclick="switchArea('admin')"><i class="ti ti-shield"></i> Admin</div>
  </div>
  <div class="section-tabs" id="section-tabs"></div>
  <div class="content-area" id="section-content"><div class="empty-state">Caricamento...</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

}

async function createAdminAccount(){
  const uname=document.getElementById('setup-uname').value.trim().toLowerCase().replace(/\s/g,'_');
  const pwd=document.getElementById('setup-pwd').value.trim();
  const msg=document.getElementById('setup-msg');msg.style.display='none';
  if(!uname||!pwd){showMsg(msg,'Inserisci username e password','#E24B4A');return;}
  if(pwd.length<6){showMsg(msg,'Password minimo 6 caratteri','#E24B4A');return;}
  try{
    const cred=await auth.createUserWithEmailAndPassword(uname+FAKE_DOMAIN,pwd);
    await db.ref('centri_estivi/users/'+cred.user.uid).set({username:uname,email:uname+FAKE_DOMAIN,isAdmin:true,created:new Date().toLocaleDateString('it-IT')});
    showMsg(msg,'✓ Account admin creato! Ora accedi.','#1D9E75');
    document.getElementById('setup-box').style.display='none';
    document.getElementById('login-username').value=uname;
  }catch(e){showMsg(msg,e.code==='auth/email-already-in-use'?'Username già esistente':e.message,'#E24B4A');}
}

async function doLogin(){
  let uname=document.getElementById('login-username').value.trim().toLowerCase();
  // Accetta sia "admin" che "admin@centri-estivi.app"
  if(uname.includes('@')) uname=uname.split('@')[0];
  const pwd=document.getElementById('login-password').value;
  const err=document.getElementById('login-error');err.style.display='none';
  if(!uname||!pwd){err.textContent='Inserisci username e password';err.style.display='block';return;}
  try{
    const cred=await auth.signInWithEmailAndPassword(uname+FAKE_DOMAIN,pwd);
    const uid=cred.user.uid;
    const userData=dbData.users&&dbData.users[uid];
    currentUser=uname;isAdmin=userData&&userData.isAdmin===true;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='block';
    document.getElementById('user-badge').textContent=uname+(isAdmin?' ★':'');
    document.getElementById('admin-tab').style.display=isAdmin?'flex':'none';
    switchArea('villa');
  }catch(e){document.getElementById('login-error').textContent='Username o password errati';document.getElementById('login-error').style.display='block';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')doLogin();});

function doLogout(){
  auth.signOut();currentUser=null;isAdmin=false;
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-username').value='';
  document.getElementById('login-password').value='';
  document.getElementById('login-password').type='password';
}

function setSyncStatus(s){const d=document.getElementById('sync-dot');if(!d)return;d.className='sync-dot'+(s==='saving'?' saving':'');}
function fbGet(path){const parts=path.split('/');let cur=dbData;for(const p of parts){if(cur==null)return null;cur=cur[p];}return cur??null;}
function fbSet(path,value){setSyncStatus('saving');db.ref('centri_estivi/'+path).set(value).then(()=>setSyncStatus('ok')).catch(()=>setSyncStatus('ok'));}
function fbRemove(path){setSyncStatus('saving');db.ref('centri_estivi/'+path).remove().then(()=>setSyncStatus('ok'));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function aLbl(){return{villa:'Villa Ester',marano:'Marano',appartamento:'Appartamento'}[currentArea]||currentArea;}
function weekTabsHtml(){return '<div class="week-tabs">'+WEEKS.map((w,i)=>`<div class="week-tab${i===currentWeek?' active':''}" onclick="selWeek(${i})">${w.label}</div>`).join('')+'</div>';}
function selWeek(i){currentWeek=i;renderSection();}

function switchArea(a){
  currentArea=a;currentWeek=0;
  document.querySelectorAll('.area-tab').forEach((t,i)=>t.classList.toggle('active',['villa','marano','appartamento','admin'][i]===a));
  if(a==='admin'){renderAdmin();document.getElementById('section-tabs').innerHTML='';return;}
  const secs=['presenze-ragazzi','presenze-educatori','turni','cassa','diario','com-richieste'];
  const icons=['users','id-badge','calendar','cash','notebook','speakerphone'];
  const labels=['Presenze ragazzi','Presenze educ.','Turni','Cassa','Diario','Comunicaz./Rich.'];
  document.getElementById('section-tabs').innerHTML=secs.map((s,i)=>`<div class="section-tab${s===currentSection?' active':''}" onclick="switchSection('${s}')"><i class="ti ti-${icons[i]}"></i> ${labels[i]}</div>`).join('');
  renderSection();
}
function switchSection(s){
  currentSection=s;currentWeek=0;
  document.querySelectorAll('.section-tab').forEach(t=>t.classList.toggle('active',t.getAttribute('onclick')&&t.getAttribute('onclick').includes(`'${s}'`)));
  renderSection();
}
function renderSection(){
  if(currentArea==='admin'){renderAdmin();return;}
  const c=document.getElementById('section-content');if(!c)return;
  ({'presenze-ragazzi':()=>renderPresenze(c,'ragazzi',20),'presenze-educatori':()=>renderPresenze(c,'educatori',15),'turni':()=>renderTurni(c),'cassa':()=>renderCassa(c),'diario':()=>renderDiario(c),'com-richieste':()=>renderComRichieste(c)}[currentSection]||(() => {}))();
}

function renderPresenze(c,tipo,nRighe){
  const isR=tipo==='ragazzi';const bp=`presenze_${tipo}/${currentArea}/w${currentWeek}`;
  let h=`<div class="section-title"><i class="ti ti-${isR?'users':'id-badge'}"></i> ${isR?'Presenze ragazzi':'Presenze educatori'} — ${aLbl()}</div>`;
  h+=weekTabsHtml();
  h+=`<div class="table-wrap"><table><thead><tr><th style="min-width:90px;">${isR?'Iniziali':'Nome'}</th>`;
  WEEKS[currentWeek].dates.forEach(d=>h+=`<th style="min-width:54px;text-align:center;">${d}</th>`);
  if(!isR) h+=`<th style="min-width:80px;">Note</th>`;
  h+=`</tr></thead><tbody>`;
  for(let r=0;r<nRighe;r++){
    h+=`<tr><td><input type="text" value="${esc(fbGet(`${bp}/names/r${r}`)||'')}" placeholder="${isR?'M.R.':'Nome'}" onblur="fbSet('${bp}/names/r${r}',this.value)"></td>`;
    for(let col=0;col<5;col++){
      const val=fbGet(`${bp}/cells/r${r}_c${col}`)||'';
      if(isR){const cls=val==='P'?'present':val==='A'?'absent':'';h+=`<td class="pa-cell"><button class="pa-btn ${cls}" data-path="${bp}/cells/r${r}_c${col}" data-val="${val}" onclick="togglePA(this)">${val||'—'}</button></td>`;}
      else{h+=`<td><input type="text" value="${esc(val)}" placeholder="orario" onblur="fbSet('${bp}/cells/r${r}_c${col}',this.value)" style="text-align:center;"></td>`;}
    }
    if(!isR) h+=`<td><input type="text" value="${esc(fbGet(`${bp}/rownotes/r${r}`)||'')}" placeholder="note" onblur="fbSet('${bp}/rownotes/r${r}',this.value)"></td>`;
    h+=`</tr>`;
  }
  h+=`</tbody></table></div>`;
  if(isR) h+=`<div class="notes-area"><label><i class="ti ti-notes"></i> Note settimana</label><textarea placeholder="Annotazioni generali..." onblur="fbSet('${bp}/weeknote',this.value)">${esc(fbGet(`${bp}/weeknote`)||'')}</textarea></div>`;
  h+=`<div class="action-bar"><button class="btn green" onclick="exportPDF('${tipo}',${currentWeek},${nRighe})"><i class="ti ti-file-type-pdf"></i> Esporta PDF</button></div>`;

  // Riepilogo presenze per tutte le settimane
  h+=`<div style="margin-top:20px;border-top:0.5px solid #e0e0d8;padding-top:14px;">`;
  h+=`<div style="font-size:13px;font-weight:500;margin-bottom:10px;"><i class="ti ti-table" style="margin-right:4px;color:#1D9E75;"></i> Presenze registrate per settimana</div>`;
  h+=`<div class="table-wrap"><table><thead><tr><th>Settimana</th><th style="text-align:center;">Presenti</th><th style="text-align:center;">Assenti</th><th style="text-align:center;">Inseriti</th><th></th></tr></thead><tbody>`;
  WEEKS.forEach((w,i)=>{
    const bpi=`presenze_${tipo}/${currentArea}/w${i}`;
    let presenti=0,assenti=0,inseriti=0;
    for(let r=0;r<nRighe;r++){
      const nome=fbGet(`${bpi}/names/r${r}`)||'';
      if(nome) inseriti++;
      for(let col=0;col<5;col++){
        const v=fbGet(`${bpi}/cells/r${r}_c${col}`)||'';
        if(v==='P') presenti++;
        if(v==='A') assenti++;
      }
    }
    const hasData=inseriti>0;
    const isCurrent=i===currentWeek;
    h+=`<tr style="${isCurrent?'background:#E1F5EE;font-weight:500;':''}${!hasData?'opacity:0.4;':''}">`;
    h+=`<td style="padding:6px 8px;font-size:12px;">${w.label}${isCurrent?' ◀':''}</td>`;
    h+=`<td style="padding:6px 8px;text-align:center;font-size:12px;color:#3B6D11;">${presenti}</td>`;
    h+=`<td style="padding:6px 8px;text-align:center;font-size:12px;color:#A32D2D;">${assenti}</td>`;
    h+=`<td style="padding:6px 8px;text-align:center;font-size:12px;">${inseriti}</td>`;
    h+=`<td style="padding:6px 8px;"><button class="btn small" onclick="selWeek(${i})" title="Vai a questa settimana"><i class="ti ti-arrow-right"></i></button></td>`;
    h+=`</tr>`;
  });
  h+=`</tbody></table></div></div>`;
  c.innerHTML=h;
}
function togglePA(btn){
  const next=btn.dataset.val===''?'P':btn.dataset.val==='P'?'A':'';
  btn.dataset.val=next;btn.textContent=next||'—';
  btn.className='pa-btn '+(next==='P'?'present':next==='A'?'absent':'');
  fbSet(btn.dataset.path,next);
}

function exportPDF(tipo,weekIdx,nRighe){

  const isR=tipo==='ragazzi';

  const bp=`presenze_${tipo}/${currentArea}/w${weekIdx}`;
  const pw=297; // larghezza A4 landscape

  // Sfondo header
  doc.setFillColor(248,248,245);doc.rect(0,0,pw,32,'F');

  if(isR){
    // PRESENZE RAGAZZI: ASP sinistra | titolo centro | Comune destra
    // Logo ASP Parma (giallo) - sinistra
    doc.addImage(LOGO_ASP,'PNG',8,3,45,15);
    // Titolo centrale
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(30,30,30);
    doc.text('CENTRI ESTIVI ASP PARMA 2026',pw/2,11,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(80,80,80);
    doc.text('Registro presenze ragazzi',pw/2,17,{align:'center'});
    // Logo Comune - destra
    doc.addImage(LOGO_COMUNE,'JPEG',pw-34,3,22,10.9);
    // Testo Comune sotto logo
    doc.setFont('helvetica','bold');doc.setFontSize(6.5);doc.setTextColor(30,30,30);
    doc.text('COMUNE DI PARMA',pw-33,22,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(5.5);doc.setTextColor(80,80,80);
    doc.text('S.O. Inclusione Persone con Disabilità',pw-33,26,{align:'center'});
    doc.text('Progetto "Adolescenza con bisogni speciali"',pw-33,29.5,{align:'center'});
  } else {
    // PRESENZE EDUCATORI: Aldia+Proges sinistra | titolo centro | ASP destra
    // Logo Aldia+Proges - sinistra
    doc.addImage(LOGO_ALDIA_PROGES,'PNG',6,5,60,13);
    // Titolo centrale
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(30,30,30);
    doc.text('CENTRI ESTIVI ASP PARMA 2026',pw/2,11,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(80,80,80);
    doc.text('Registro presenze educatori',pw/2,17,{align:'center'});
    // Logo ASP - destra
    doc.addImage(LOGO_ASP,'PNG',pw-52,4,44,14);
  }

  // Linea separatrice
  doc.setDrawColor(29,158,117);doc.setLineWidth(0.6);doc.line(8,33,pw-8,33);

  // Info settimana e area
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(30,30,30);
  doc.text(`${aLbl()} — Settimana: ${w.label}`,14,40);

  // Tabella presenze
  const head=[[isR?'Iniziali':'Educatore',...w.dates,'Note']];
  const body=[];
  for(let r=0;r<nRighe;r++){
    let row=[fbGet(`${bp}/names/r${r}`)||''];
    for(let col=0;col<5;col++) row.push(fbGet(`${bp}/cells/r${r}_c${col}`)||'');
    row.push(isR?(r===0?fbGet(`${bp}/weeknote`)||'':''):fbGet(`${bp}/rownotes/r${r}`)||'');
    body.push(row);
  }
  doc.autoTable({
    head,body,startY:43,
    styles:{fontSize:9,cellPadding:2.5},
    headStyles:{fillColor:[29,158,117],textColor:255,fontStyle:'bold'},
    columnStyles:{0:{cellWidth:30}},
    alternateRowStyles:{fillColor:[248,248,245]},
    margin:{left:8,right:8}
  });

  // Footer
  const pageH=doc.internal.pageSize.getHeight();
  doc.setFontSize(7);doc.setTextColor(160,160,160);
  doc.text(`Generato il ${new Date().toLocaleDateString('it-IT')} — Centri Estivi ASP Parma 2026`,pw/2,pageH-4,{align:'center'});

  doc.save(`presenze_${tipo}_${currentArea}_${w.label.replace(/[\/\s\u2013]/g,'-')}.pdf`);
}

// ── BOTTONI AZIONE POST (modifica/archivia/elimina) ───────
function postActionBtns(tipo, area, key, testo){
  const t=encodeURIComponent(testo);
  return `<div style="display:flex;gap:5px;flex-shrink:0;">
    <button class="btn small" title="Modifica" onclick="startEdit('${tipo}','${area}','${key}')"><i class="ti ti-pencil"></i></button>
    <button class="btn small" title="Archivia" onclick="archiviaPost('${tipo}','${area}','${key}')"><i class="ti ti-archive"></i></button>
    <button class="btn small red" title="Elimina" onclick="eliminaPost('${tipo}','${area}','${key}')"><i class="ti ti-trash"></i></button>
  </div>`;
}

function startEdit(tipo, area, key){
  const path=`${tipo}/${area}/${key}`;
  const e=fbGet(path);
  if(!e)return;
  const card=document.querySelector(`[data-key="${key}"]`);
  if(!card)return;
  const oldTesto=e.testo||'';
  card.innerHTML=`
    <textarea id="edit-${key}" style="width:100%;min-height:80px;border:0.5px solid #1D9E75;border-radius:8px;padding:8px;font-size:13px;font-family:inherit;resize:vertical;">${oldTesto}</textarea>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn green small" onclick="saveEdit('${tipo}','${area}','${key}')"><i class="ti ti-check"></i> Salva</button>
      <button class="btn small" onclick="renderSection()"><i class="ti ti-x"></i> Annulla</button>
    </div>`;
}

function saveEdit(tipo, area, key){
  const nuovoTesto=document.getElementById(`edit-${key}`).value.trim();
  if(!nuovoTesto){alert('Il testo non può essere vuoto.');return;}
  fbSet(`${tipo}/${area}/${key}/testo`, nuovoTesto);
  fbSet(`${tipo}/${area}/${key}/modificato`, new Date().toLocaleDateString('it-IT'));
}

function archiviaPost(tipo, area, key){
  if(!confirm('Archiviare questo post? Sarà visibile nella sezione archivio.'))return;
  fbSet(`${tipo}/${area}/${key}/archiviato`, true);
}

function eliminaPost(tipo, area, key){
  if(!confirm('Eliminare definitivamente questo post?'))return;
  fbRemove(`${tipo}/${area}/${key}`);
}

function ripristinaPost(tipo, area, key){
  fbSet(`${tipo}/${area}/${key}/archiviato`, false);
}

  const mostraArch=showArchivio.diario[currentArea]||false;

  let h=`<div class="section-title"><i class="ti ti-notebook"></i> Diario di bordo — ${aLbl()}</div>`;
  h+=`<div class="form-group"><label>Autore (iniziali)</label><input type="text" id="d-autore" placeholder="es. M.R." style="width:110px;"></div>`;
  h+=`<div class="form-group"><label>Settimana</label><select id="d-week">${WEEKS.map((w,i)=>`<option value="${i}">${w.label}</option>`).join('')}</select></div>`;
  h+=`<div class="form-group"><label>Resoconto della giornata</label><textarea id="d-testo" placeholder="Descrivi come è andata la giornata... (usa solo iniziali per i ragazzi)"></textarea></div>`;
  h+=`<div class="action-bar"><button class="btn green" onclick="addDiario()"><i class="ti ti-check"></i> Salva nel diario</button></div>`;

  if(attivi.length>0){
    h+=`<div style="margin-top:16px;">`;
    attivi.forEach(([key,e])=>{
      h+=`<div class="card" data-key="${key}"><div class="meta" style="align-items:flex-start;">`;
      h+=`<span>${e.data} — sett. ${e.week} — <strong>${e.autore}</strong>${e.modificato?` <span style="font-size:10px;color:#aaa;">(mod. ${e.modificato})</span>`:''}</span>`;
      h+=postActionBtns('diario',currentArea,key,e.testo);
      h+=`</div><div class="testo">${e.testo.replace(/\n/g,'<br>')}</div></div>`;
    });
    h+=`</div>`;
  } else {
    h+=`<div class="empty-state" style="margin-top:16px;"><i class="ti ti-notebook" style="font-size:24px;display:block;margin-bottom:8px;"></i>Nessuna voce nel diario.</div>`;
  }

  // Archivio
  if(archiviati.length>0){
    h+=`<div style="margin-top:16px;">`;
    h+=`<button class="btn small" onclick="toggleArchivio('diario')" style="margin-bottom:10px;"><i class="ti ti-archive"></i> Archivio (${archiviati.length}) ${mostraArch?'▲':'▼'}</button>`;
    if(mostraArch){
      archiviati.forEach(([key,e])=>{
        h+=`<div class="card" data-key="${key}" style="opacity:0.6;border-style:dashed;">`;
        h+=`<div class="meta" style="align-items:flex-start;"><span>${e.data} — sett. ${e.week} — <strong>${e.autore}</strong> <span class="badge" style="background:#e0e0d8;color:#888;">Archiviato</span></span>`;
        h+=`<div style="display:flex;gap:5px;flex-shrink:0;">`;
        h+=`<button class="btn small" title="Ripristina" onclick="ripristinaPost('diario','${currentArea}','${key}')"><i class="ti ti-arrow-back-up"></i></button>`;
        h+=`<button class="btn small red" title="Elimina" onclick="eliminaPost('diario','${currentArea}','${key}')"><i class="ti ti-trash"></i></button>`;
        h+=`</div></div><div class="testo">${e.testo.replace(/\n/g,'<br>')}</div></div>`;
      });
    }
    h+=`</div>`;
  }
  c.innerHTML=h;
}

function addDiario(){
  const autore=document.getElementById('d-autore').value.trim();const testo=document.getElementById('d-testo').value.trim();const weekIdx=document.getElementById('d-week').value;
  if(!autore||!testo){alert('Inserisci autore e testo.');return;}
  fbSet(`diario/${currentArea}/e${Date.now()}`,{autore,testo,week:WEEKS[weekIdx].label,data:new Date().toLocaleDateString('it-IT'),archiviato:false});
  document.getElementById('d-testo').value='';document.getElementById('d-autore').value='';
}

function renderComRichieste(c){

  if(comInnerTab==='comunicazioni'){
    const coms=fbGet(`comunicazioni/${currentArea}`)||{};
    const attivi=Object.entries(coms).filter(([,e])=>e.archiviato!==true).sort((a,b)=>b[0].localeCompare(a[0]));
    const archiviati=Object.entries(coms).filter(([,e])=>e.archiviato===true).sort((a,b)=>b[0].localeCompare(a[0]));
    const mostraArch=showArchivio.comunicazioni[currentArea]||false;
    const waMsg=encodeURIComponent(`[Comunicazione ${aLbl()}] `);

    h+=`<div class="info-box"><i class="ti ti-info-circle"></i> Bacheca della coordinatrice.</div>`;
    h+=`<div class="form-group"><label>Nuova comunicazione</label><textarea id="com-testo" placeholder="Testo della comunicazione..."></textarea></div>`;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;"><input type="checkbox" id="com-imp" style="width:18px;height:18px;"> <label for="com-imp" style="font-size:13px;color:#888;">Segna come urgente</label></div>`;
    h+=`<div class="action-bar"><button class="btn green" onclick="addCom()"><i class="ti ti-send"></i> Pubblica</button><a href="https://wa.me/${WA_NUMBER}?text=${waMsg}" target="_blank" class="btn" style="background:#25D366;color:#fff;border-color:#25D366;"><i class="ti ti-brand-whatsapp"></i> Invia su WhatsApp</a></div>`;

    if(attivi.length>0){
      h+=`<div style="margin-top:16px;">`;
      attivi.forEach(([key,e])=>{
        h+=`<div class="card ${e.importante?'urgent':''}" data-key="${key}"><div class="meta" style="align-items:flex-start;">`;
        h+=`<span>${e.data}${e.importante?' <span class="badge badge-urgent">Urgente</span>':''}${e.modificato?` <span style="font-size:10px;color:#aaa;">(mod. ${e.modificato})</span>`:''}</span>`;
        h+=postActionBtns('comunicazioni',currentArea,key,e.testo);
        h+=`</div><div class="testo">${e.testo.replace(/\n/g,'<br>')}</div></div>`;
      });
      h+=`</div>`;
    } else {
      h+=`<div class="empty-state" style="margin-top:16px;">Nessuna comunicazione pubblicata</div>`;
    }

    if(archiviati.length>0){
      h+=`<div style="margin-top:16px;">`;
      h+=`<button class="btn small" onclick="toggleArchivio('comunicazioni')" style="margin-bottom:10px;"><i class="ti ti-archive"></i> Archivio (${archiviati.length}) ${mostraArch?'▲':'▼'}</button>`;
      if(mostraArch){
        archiviati.forEach(([key,e])=>{
          h+=`<div class="card" data-key="${key}" style="opacity:0.6;border-style:dashed;">`;
          h+=`<div class="meta" style="align-items:flex-start;"><span>${e.data} <span class="badge" style="background:#e0e0d8;color:#888;">Archiviato</span></span>`;
          h+=`<div style="display:flex;gap:5px;flex-shrink:0;">`;
          h+=`<button class="btn small" title="Ripristina" onclick="ripristinaPost('comunicazioni','${currentArea}','${key}')"><i class="ti ti-arrow-back-up"></i></button>`;
          h+=`<button class="btn small red" title="Elimina" onclick="eliminaPost('comunicazioni','${currentArea}','${key}')"><i class="ti ti-trash"></i></button>`;
          h+=`</div></div><div class="testo">${e.testo.replace(/\n/g,'<br>')}</div></div>`;
        });
      }
      h+=`</div>`;
    }

  } else {
    const richieste=fbGet(`richieste/${currentArea}`)||{};

    const archiviati=Object.entries(richieste).filter(([,e])=>e.archiviato===true).sort((a,b)=>b[0].localeCompare(a[0]));
    const mostraArch=showArchivio.richieste[currentArea]||false;

    h+=`<div class="info-box"><i class="ti ti-mail"></i> Le richieste arrivano a <strong>p.montermini@asp.parma.it</strong> e vengono salvate qui.</div>`;
    h+=`<div class="form-group"><label>Tuo nome (iniziali)</label><input type="text" id="rich-autore" placeholder="es. M.R." style="width:110px;"></div>`;
    h+=`<div class="form-group"><label>Oggetto</label><input type="text" id="rich-oggetto" placeholder="es. Richiesta materiali"></div>`;
    h+=`<div class="form-group"><label>Messaggio</label><textarea id="rich-testo" placeholder="Descrivi la tua richiesta..."></textarea></div>`;
    h+=`<div class="action-bar"><button class="btn green" onclick="inviaRichiesta()"><i class="ti ti-send"></i> Invia alla coordinatrice</button></div>`;

    if(attivi.length>0){
      h+=`<div style="margin-top:16px;"><div style="font-size:13px;font-weight:500;margin-bottom:8px;">Richieste inviate</div>`;
      attivi.forEach(([key,e])=>{
        h+=`<div class="card richiesta" data-key="${key}"><div class="meta" style="align-items:flex-start;">`;
        h+=`<span>${e.data} — <strong>${e.autore}</strong> <span class="badge badge-richiesta">${e.oggetto||'Richiesta'}</span>${e.modificato?` <span style="font-size:10px;color:#aaa;">(mod. ${e.modificato})</span>`:''}</span>`;
        h+=postActionBtns('richieste',currentArea,key,e.testo);
        h+=`</div><div class="testo">${e.testo.replace(/\n/g,'<br>')}</div></div>`;
      });
      h+=`</div>`;
    }

    if(archiviati.length>0){
      h+=`<div style="margin-top:16px;">`;
      h+=`<button class="btn small" onclick="toggleArchivio('richieste')" style="margin-bottom:10px;"><i class="ti ti-archive"></i> Archivio (${archiviati.length}) ${mostraArch?'▲':'▼'}</button>`;
      if(mostraArch){
        archiviati.forEach(([key,e])=>{
          h+=`<div class="card richiesta" data-key="${key}" style="opacity:0.6;border-style:dashed;">`;
          h+=`<div class="meta" style="align-items:flex-start;"><span>${e.data} — <strong>${e.autore}</strong> <span class="badge" style="background:#e0e0d8;color:#888;">Archiviato</span></span>`;
          h+=`<div style="display:flex;gap:5px;flex-shrink:0;">`;
          h+=`<button class="btn small" title="Ripristina" onclick="ripristinaPost('richieste','${currentArea}','${key}')"><i class="ti ti-arrow-back-up"></i></button>`;
          h+=`<button class="btn small red" title="Elimina" onclick="eliminaPost('richieste','${currentArea}','${key}')"><i class="ti ti-trash"></i></button>`;
          h+=`</div></div><div class="testo">${e.testo.replace(/\n/g,'<br>')}</div></div>`;
        });
      }
      h+=`</div>`;
    }

  c.innerHTML=h;
}

function switchComTab(tab){comInnerTab=tab;renderSection();}

function addCom(){
  const testo=document.getElementById('com-testo').value.trim();const imp=document.getElementById('com-imp').checked;
  if(!testo)return;
  fbSet(`comunicazioni/${currentArea}/c${Date.now()}`,{testo,importante:imp,data:new Date().toLocaleDateString('it-IT'),archiviato:false});
  document.getElementById('com-testo').value='';document.getElementById('com-imp').checked=false;
}

function inviaRichiesta(){
  const autore=document.getElementById('rich-autore').value.trim();
  const oggetto=document.getElementById('rich-oggetto').value.trim();
  const testo=document.getElementById('rich-testo').value.trim();
  if(!autore||!testo){alert('Inserisci almeno le iniziali e il messaggio.');return;}
  fbSet(`richieste/${currentArea}/r${Date.now()}`,{autore,oggetto,testo,data:new Date().toLocaleDateString('it-IT'),archiviato:false});
  window.open(`mailto:p.montermini@asp.parma.it?subject=${encodeURIComponent(`[Centro Estivo - ${aLbl()}] ${oggetto||'Richiesta'}`)}&body=${encodeURIComponent(`Da: ${autore}\nArea: ${aLbl()}\n\n${testo}`)}`);
  document.getElementById('rich-autore').value='';document.getElementById('rich-oggetto').value='';document.getElementById('rich-testo').value='';
}

function renderAdmin(){
  if(!isAdmin){document.getElementById('section-content').innerHTML='<div class="empty-state">Accesso negato</div>';return;}
  const users=dbData.users||{};const list=Object.entries(users).filter(([,u])=>!u.isAdmin);
  const c=document.getElementById('section-content');
  let h=`<div class="section-title"><i class="ti ti-shield"></i> Pannello Admin <span class="badge badge-admin">Solo admin</span></div>`;
  h+=`<div class="info-box">Crea gli account per gli educatori.</div>`;
  h+=`<div style="background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:14px;margin-bottom:16px;">`;
  h+=`<div style="font-size:13px;font-weight:500;margin-bottom:10px;">Crea nuovo account educatore</div>`;
  h+=`<div class="form-group"><label>Username (senza spazi)</label><input type="text" id="new-uname" placeholder="es. giulia_villa" autocapitalize="none" autocorrect="off"></div>`;
  h+=`<div class="form-group"><label>Password</label><div class="form-pwd-wrap"><input type="password" id="new-pwd" placeholder="es. Estate2026!"><button class="form-pwd-toggle" onclick="toggleDynPwd('new-pwd',this)" type="button"><i class="ti ti-eye"></i></button></div></div>`;
  h+=`<button class="btn green" onclick="createUser()"><i class="ti ti-user-plus"></i> Crea account</button>`;
  h+=`<div id="create-msg" style="font-size:13px;margin-top:8px;display:none;"></div></div>`;
  h+=`<div style="font-size:13px;font-weight:500;margin-bottom:10px;">Educatori registrati (${list.length})</div>`;
  if(list.length===0){h+=`<div class="empty-state">Nessun educatore registrato ancora</div>`;}
  else{list.forEach(([uid,u])=>{h+=`<div class="admin-user-card"><div><div style="font-size:14px;font-weight:500;"><i class="ti ti-user" style="margin-right:4px;color:#1D9E75;"></i>${u.username}</div><div style="font-size:11px;color:#888;">Creato il ${u.created||'—'}</div></div><button class="btn small red" onclick="deleteUser('${uid}','${u.username}')"><i class="ti ti-trash"></i> Elimina</button></div>`;});}
  c.innerHTML=h;
}
async function createUser(){
  const uname=document.getElementById('new-uname').value.trim().toLowerCase().replace(/\s/g,'_');
  const pwd=document.getElementById('new-pwd').value.trim();
  const msg=document.getElementById('create-msg');msg.style.display='none';
  if(!uname||!pwd){showMsg(msg,'Inserisci username e password','#E24B4A');return;}
  if(pwd.length<6){showMsg(msg,'Password minimo 6 caratteri','#E24B4A');return;}
  try{
    const cred=await auth.createUserWithEmailAndPassword(uname+FAKE_DOMAIN,pwd);
    await db.ref('centri_estivi/users/'+cred.user.uid).set({username:uname,email:uname+FAKE_DOMAIN,isAdmin:false,created:new Date().toLocaleDateString('it-IT')});
    showMsg(msg,`✓ Account "${uname}" creato!`,'#1D9E75');
    document.getElementById('new-uname').value='';document.getElementById('new-pwd').value='';
  }catch(e){showMsg(msg,e.code==='auth/email-already-in-use'?`Username "${uname}" già esistente`:e.message,'#E24B4A');}
}
async function deleteUser(uid,uname){
  if(!confirm(`Eliminare l'account "${uname}"?`))return;
  try{
    await db.ref('centri_estivi/users/'+uid).remove();
    alert(`Account "${uname}" rimosso.\nPer eliminarlo da Firebase Auth vai su Firebase Console → Authentication → Utenti e cerca ${uname+FAKE_DOMAIN}`);
    renderAdmin();
  }catch(e){alert('Errore: '+e.message);}
}
function showMsg(el,txt,color){el.textContent=txt;el.style.color=color;el.style.display='block';}
