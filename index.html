<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Centri Estivi · ASP Parma</title>
  <meta name="theme-color" content="#f5f5f4" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style> html, body { background: #e7e5e4; } * { -webkit-tap-highlight-color: transparent; } </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Forza il runtime "classico" di React (evita l'errore "import statement outside a module")
    Babel.registerPreset("classic", { presets: [[Babel.availablePresets.react, { runtime: "classic" }]] });
  </script>
  <script type="text/babel" data-presets="classic">
    const { useState, useEffect } = React;

    // ══════════════════════════════════════════════════════════════
    //  CONFIGURAZIONE  (le tue credenziali)
    // ══════════════════════════════════════════════════════════════
    const firebaseConfig = {
      apiKey: "AIzaSyBbyyT-i9dyTT-5MxC47lsGI46ZSbiwqTE",
      authDomain: "centri-estivi-asp-2026.firebaseapp.com",
      databaseURL: "https://centri-estivi-asp-2026-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "centri-estivi-asp-2026",
      storageBucket: "centri-estivi-asp-2026.firebasestorage.app",
      messagingSenderId: "627544943347",
      appId: "1:627544943347:web:1dd804c943f1d65dc1a586"
    };
    const ADMIN_EMAIL = "admin@centri-estivi.app"; // ← chi entra con questa mail è Amministratore

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const ref = (p) => db.ref("v2/" + p);

    // ══════════════════════════════════════════════════════════════
    //  Colori dei centri (RGB esatti)
    // ══════════════════════════════════════════════════════════════
    function hexToRgb(hex){const h=hex.replace("#","");return{r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};}
    function rgba(hex,a){const{r,g,b}=hexToRgb(hex);return `rgba(${r},${g},${b},${a})`;}
    function relLum(hex){const{r,g,b}=hexToRgb(hex);const f=c=>{c/=255;return c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);};return 0.2126*f(r)+0.7152*f(g)+0.0722*f(b);}
    function shade(hex,pct){const{r,g,b}=hexToRgb(hex);const t=pct<0?0:255,p=Math.abs(pct);const m=c=>Math.round((t-c)*p+c);return `rgb(${m(r)},${m(g)},${m(b)})`;}
    function theme(base){const onGradient=relLum(base)>0.5?"#1c1917":"#ffffff";return{base,gradient:`linear-gradient(135deg, ${base} 0%, ${shade(base,-0.25)} 100%)`,onGradient,soft:rgba(base,0.15),accentText:shade(base,-0.4),dot:base};}

    const CENTERS = [
      { id:"marano",     name:"Marano",      sub:"Centro estivo", ...theme("#70AD47") },
      { id:"villaester", name:"Villa Ester", sub:"Centro estivo", ...theme("#ECD45A") },
      { id:"pasubio",    name:"Pasubio",     sub:"Centro estivo", ...theme("#009999") },
    ];
    const CATEGORIES = ["Beni di prima necessità","Materiale attività","Socializzazione","Altro"];

    // ── date ──
    const isoLocal=(d)=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");return `${y}-${m}-${day}`;};
    const TODAY=isoLocal(new Date());
    const fmtIt=(iso)=>{const[y,m,d]=iso.split("-");return `${d}/${m}/${y}`;};
    const fmtItShort=(iso)=>{const[,m,d]=iso.split("-");return `${d}/${m}`;};
    const addDays=(iso,n)=>{const[y,m,d]=iso.split("-").map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+n);return isoLocal(dt);};
    const mondayOf=(iso)=>{const[y,m,d]=iso.split("-").map(Number);const dt=new Date(y,m-1,d);const dow=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-dow);return isoLocal(dt);};

    const timeOptions=(s,e)=>{const o=[];for(let h=s;h<=e;h++){for(const m of[0,30]){if(h===e&&m>0)break;o.push(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);}}return o;};
    const ENTRATA=timeOptions(8,15), USCITA=timeOptions(8,24);
    const GIORNI=["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì"];
    const initials=(f)=>f.split(" ").map(p=>p[0]?.toUpperCase()||"").join("").slice(0,3);
    const euro=(n)=>new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(n||0);

    // ══════════════════════════════════════════════════════════════
    //  Icone (SVG inline)
    // ══════════════════════════════════════════════════════════════
    const P = {
      users:<React.Fragment><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></React.Fragment>,
      clock:<React.Fragment><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></React.Fragment>,
      receipt:<React.Fragment><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M8 8h8"/><path d="M8 12h8"/></React.Fragment>,
      chevronLeft:<polyline points="15 18 9 12 15 6"/>,
      plus:<React.Fragment><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></React.Fragment>,
      check:<polyline points="20 6 9 17 4 12"/>,
      x:<React.Fragment><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></React.Fragment>,
      wallet:<React.Fragment><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></React.Fragment>,
      arrowDR:<React.Fragment><polyline points="7 7 17 7 17 17"/><line x1="7" y1="7" x2="17" y2="17"/></React.Fragment>,
      shield:<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>,
      hardhat:<React.Fragment><path d="M2 18a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-1a6 6 0 0 0-6-6H8a6 6 0 0 0-6 6Z"/><path d="M10 5V4a2 2 0 0 1 4 0v1"/></React.Fragment>,
      sun:<React.Fragment><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="5" y1="5" x2="7" y2="7"/><line x1="17" y1="17" x2="19" y2="19"/><line x1="19" y1="5" x2="17" y2="7"/><line x1="7" y1="17" x2="5" y2="19"/></React.Fragment>,
      trash:<React.Fragment><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></React.Fragment>,
      save:<React.Fragment><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></React.Fragment>,
      download:<React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></React.Fragment>,
      calendar:<React.Fragment><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></React.Fragment>,
      logout:<React.Fragment><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></React.Fragment>,
    };
    function Icon({name, className, style}){
      return <svg className={className} style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{P[name]}</svg>;
    }

    // ══════════════════════════════════════════════════════════════
    //  APP
    // ══════════════════════════════════════════════════════════════
    function App(){
      const [user,setUser]=useState(null);
      const [authReady,setAuthReady]=useState(false);
      const [data,setData]=useState(null);

      useEffect(()=>auth.onAuthStateChanged(u=>{setUser(u);setAuthReady(true);}),[]);
      useEffect(()=>{
        if(!user) return;
        const r=ref("");
        const cb=r.on("value",s=>setData(s.val()||{}));
        return ()=>r.off("value",cb);
      },[user]);

      if(!authReady) return <Splash text="Avvio…" />;
      if(!user) return <Login />;
      if(data===null) return <Splash text="Carico i dati…" />;

      const role = (user.email===ADMIN_EMAIL) ? "admin" : "educator";
      return <Main user={user} role={role} data={data} />;
    }

    function Splash({text}){
      return <div className="min-h-screen bg-stone-200 flex items-center justify-center">
        <div className="text-stone-500 text-sm font-medium">{text}</div>
      </div>;
    }

    // ── Login ──
    function Login(){
      const [email,setEmail]=useState("");
      const [pw,setPw]=useState("");
      const [err,setErr]=useState("");
      const [busy,setBusy]=useState(false);
      const submit=()=>{
        setErr("");setBusy(true);
        auth.signInWithEmailAndPassword(email.trim(),pw)
          .catch(()=>{setErr("Email o password non corretti.");setBusy(false);});
      };
      return (
        <div className="min-h-screen bg-stone-200 flex items-center justify-center p-6">
          <div className="w-full max-w-sm bg-white rounded-3xl shadow-xl p-7">
            <div className="h-14 w-14 rounded-2xl flex items-center justify-center mb-5" style={{background:CENTERS[2].gradient,color:"#fff"}}>
              <Icon name="sun" className="h-7 w-7" />
            </div>
            <h1 className="text-xl font-bold text-stone-800">Centri Estivi</h1>
            <p className="text-sm text-stone-400 mb-6">ASP Parma · accedi per continuare</p>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="Email"
              className="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-stone-300" />
            <input value={pw} onChange={e=>setPw(e.target.value)} type="password" placeholder="Password"
              onKeyDown={e=>e.key==="Enter"&&submit()}
              className="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-stone-300" />
            {err && <p className="text-sm text-rose-500 mb-3">{err}</p>}
            <button onClick={submit} disabled={busy}
              className="w-full rounded-2xl py-3.5 font-semibold text-white bg-stone-800 active:scale-[0.99] disabled:opacity-50">
              {busy?"Accesso…":"Accedi"}
            </button>
          </div>
        </div>
      );
    }

    // ── Main ──
    function Main({user,role,data}){
      const [screen,setScreen]=useState("home");
      const [center,setCenter]=useState(null);
      const [tab,setTab]=useState("presenze");
      const t=CENTERS.find(c=>c.id===center);

      const rosterArr=(cid)=>Object.entries(data.roster?.[cid]||{}).map(([id,v])=>({id,name:v.name}));
      const marksToday=(cid)=>data.attendance?.[cid]?.[TODAY]||{};
      const expArr=(cid)=>Object.entries(data.expenses?.[cid]||{}).map(([id,v])=>({id,...v}));
      const fundOf=(cid)=>data.funds?.[cid]||0;

      return (
        <div className="min-h-screen bg-stone-200 flex justify-center py-4">
          <div className="relative w-full max-w-md bg-stone-50 min-h-screen shadow-xl overflow-hidden">
            {/* header */}
            <div className="sticky top-0 z-10 bg-stone-50/90 backdrop-blur px-5 py-3 flex items-center justify-between border-b border-stone-100">
              <span className="font-bold text-stone-800 text-sm tracking-tight">Centri Estivi</span>
              <div className="flex items-center gap-2">
                <span className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-stone-200 text-stone-600">
                  <Icon name={role==="admin"?"shield":"hardhat"} className="h-3.5 w-3.5" />
                  {role==="admin"?"Admin":"Educatore"}
                </span>
                <button onClick={()=>auth.signOut()} className="text-stone-400 active:text-stone-700 p-1"><Icon name="logout" className="h-4 w-4" /></button>
              </div>
            </div>

            {screen==="home" ? (
              <>
                <div className="px-5 pt-6 pb-2">
                  <p className="text-sm font-medium text-stone-400">Buongiorno 👋</p>
                  <h1 className="text-2xl font-bold text-stone-800 tracking-tight">Dove lavori oggi?</h1>
                </div>
                <div className="px-5 pt-3 space-y-4">
                  {CENTERS.map(c=>{
                    const mk=marksToday(c.id);
                    const presenti=rosterArr(c.id).filter(p=>mk[p.id]).length;
                    const saldo=fundOf(c.id)-expArr(c.id).reduce((s,e)=>s+(e.amount||0),0);
                    return (
                      <button key={c.id} onClick={()=>{setCenter(c.id);setTab("presenze");setScreen("center");}}
                        style={{background:c.gradient,color:c.onGradient}}
                        className="w-full text-left rounded-3xl p-5 shadow-lg active:scale-[0.98] transition-transform">
                        <div className="flex items-center justify-between">
                          <div>
                            <p className="text-xs font-semibold uppercase tracking-wider" style={{opacity:.7}}>{c.sub}</p>
                            <p className="text-2xl font-bold mt-0.5">{c.name}</p>
                          </div>
                          <div className="h-12 w-12 rounded-2xl flex items-center justify-center" style={{backgroundColor:c.onGradient==="#ffffff"?"rgba(255,255,255,.2)":"rgba(0,0,0,.08)"}}>
                            <Icon name="sun" className="h-6 w-6" />
                          </div>
                        </div>
                        <div className="mt-4 flex gap-3 text-xs font-medium" style={{opacity:.85}}>
                          <span>{presenti} presenti oggi</span><span>·</span><span>{euro(saldo)} in cassa</span>
                        </div>
                      </button>
                    );
                  })}
                </div>
                <div className="px-5 pt-6 pb-4"><p className="text-xs text-stone-400 text-center">Centri Estivi · ASP Parma</p></div>
              </>
            ) : (
              <>
                <div className="px-5 pt-5 pb-4" style={{backgroundColor:t.soft}}>
                  <button onClick={()=>setScreen("home")} className="flex items-center gap-1 text-stone-500 text-sm font-medium mb-2 active:opacity-60">
                    <Icon name="chevronLeft" className="h-4 w-4" /> Centri
                  </button>
                  <div className="flex items-center gap-3">
                    <span className="h-3 w-3 rounded-full" style={{backgroundColor:t.dot}} />
                    <h1 className="text-2xl font-bold text-stone-800">{t.name}</h1>
                  </div>
                </div>

                <div className="px-5 pt-5 pb-28">
                  {tab==="presenze" && <Presenze center={center} role={role} roster={rosterArr(center)} data={data} t={t} />}
                  {tab==="ore" && <Ore center={center} user={user} t={t} />}
                  {tab==="spese" && <Spese center={center} role={role} user={user} expenses={expArr(center)} fund={fundOf(center)} t={t} />}
                </div>

                <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/95 backdrop-blur border-t border-stone-100">
                  <div className="flex">
                    {[{id:"presenze",label:"Presenze",icon:"users"},{id:"ore",label:"Ore",icon:"clock"},{id:"spese",label:"Spese",icon:"receipt"}].map(x=>{
                      const active=tab===x.id;
                      return (
                        <button key={x.id} onClick={()=>setTab(x.id)} className="flex-1 flex flex-col items-center gap-1 py-3" style={{color:active?t.accentText:undefined}}>
                          <Icon name={x.icon} className={"h-5 w-5 "+(active?"":"text-stone-400")} />
                          <span className={"text-xs font-medium "+(active?"":"text-stone-400")}>{x.label}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ── Presenze ──
    function Presenze({center,role,roster,data,t}){
      const [date,setDate]=useState(TODAY);
      const [newName,setNewName]=useState("");
      const marks=data.attendance?.[center]?.[date]||{};
      const getMark=(id)=>!!marks[id];
      const presenti=roster.filter(p=>getMark(p.id)).length;

      const toggle=(id)=>ref(`attendance/${center}/${date}/${id}`).set(!getMark(id));
      const add=()=>{ if(!newName.trim())return; ref(`roster/${center}`).push({name:newName.trim()}); setNewName(""); };
      const scarica=()=>{
        const rows=[["Centro","Data","Utente","Presenza"]];
        roster.forEach(p=>rows.push([center,fmtIt(date),p.name,getMark(p.id)?"Presente":"Assente"]));
        const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${c}"`).join(";")).join("\n");
        const url=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
        const a=document.createElement("a");a.href=url;a.download=`presenze_${center}_${date}.csv`;a.click();URL.revokeObjectURL(url);
      };

      return (
        <div>
          <div className="flex items-center gap-2 bg-white rounded-2xl p-3 shadow-sm mb-4">
            <Icon name="calendar" className="h-5 w-5" style={{color:t.accentText}} />
            <div className="flex-1">
              <p className="text-xs text-stone-400">Giornata</p>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="text-sm font-semibold text-stone-800 bg-transparent focus:outline-none" />
            </div>
            <span className="text-sm font-semibold" style={{color:t.accentText}}>{presenti}/{roster.length}</span>
          </div>

          <h2 className="text-lg font-bold text-stone-800 mb-3">Presenze del {fmtIt(date)}</h2>

          <div className="space-y-2">
            {roster.length===0 && <p className="text-sm text-stone-400 text-center py-6">Nessun utente. {role==="admin"?"Aggiungine uno qui sotto.":"L'amministratore deve inserire gli utenti."}</p>}
            {roster.map(p=>{
              const present=getMark(p.id);
              return (
                <div key={p.id} className="flex items-center gap-3 bg-white rounded-2xl p-3 shadow-sm">
                  <div className="h-10 w-10 rounded-full flex items-center justify-center font-bold text-sm" style={{backgroundColor:t.soft,color:t.accentText}}>{initials(p.name)}</div>
                  <div className="flex-1 min-w-0"><p className="font-medium text-stone-800 truncate">{role==="admin"?p.name:initials(p.name)}</p></div>
                  <button onClick={()=>toggle(p.id)} className={"h-9 w-9 rounded-xl flex items-center justify-center transition-colors "+(present?"bg-emerald-500 text-white":"bg-stone-100 text-stone-400")}>
                    <Icon name={present?"check":"x"} className="h-5 w-5" />
                  </button>
                </div>
              );
            })}
          </div>

          {role==="admin" && (
            <>
              <div className="mt-5 flex gap-2">
                <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Nome e cognome nuovo utente"
                  className="flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
                <button onClick={add} className="h-12 w-12 rounded-2xl bg-stone-800 text-white flex items-center justify-center active:scale-95"><Icon name="plus" className="h-5 w-5" /></button>
              </div>
              <button onClick={scarica} className="mt-3 w-full rounded-2xl py-3 font-semibold text-stone-700 bg-stone-100 flex items-center justify-center gap-2 active:scale-[0.99]">
                <Icon name="download" className="h-5 w-5" /> Scarica presenze del {fmtIt(date)}
              </button>
            </>
          )}
        </div>
      );
    }

    // ── Ore ──
    function Ore({center,user,t}){
      const [nome,setNome]=useState("");
      const [weekStart,setWeekStart]=useState(mondayOf(TODAY));
      const [grid,setGrid]=useState(GIORNI.reduce((a,g)=>({...a,[g]:{in:"08:00",out:"16:30"}}),{}));
      const [saved,setSaved]=useState(false);
      const setCell=(g,f,v)=>{setGrid(p=>({...p,[g]:{...p[g],[f]:v}}));setSaved(false);};
      const save=()=>{
        if(!nome.trim()) return;
        ref(`hours/${center}/${weekStart}`).push({nome:nome.trim(),giorni:grid,by:user.email,ts:Date.now()});
        setSaved(true);
      };
      return (
        <div>
          <h2 className="text-lg font-bold text-stone-800 mb-4">Ore settimanali</h2>
          <input value={nome} onChange={e=>{setNome(e.target.value);setSaved(false);}} placeholder="Nome e cognome educatore"
            className="w-full rounded-2xl border border-stone-200 px-4 py-3 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-stone-300" />
          <div className="flex items-center gap-2 bg-white rounded-2xl p-3 shadow-sm mb-4">
            <Icon name="calendar" className="h-5 w-5" style={{color:t.accentText}} />
            <div className="flex-1">
              <p className="text-xs text-stone-400">Settimana dal</p>
              <input type="date" value={weekStart} onChange={e=>{setWeekStart(mondayOf(e.target.value));setSaved(false);}} className="text-sm font-semibold text-stone-800 bg-transparent focus:outline-none" />
            </div>
            <span className="text-xs text-stone-400">{fmtItShort(weekStart)}–{fmtItShort(addDays(weekStart,4))}</span>
          </div>
          <div className="space-y-2">
            {GIORNI.map((g,i)=>(
              <div key={g} className="bg-white rounded-2xl p-3 shadow-sm">
                <div className="flex items-baseline justify-between mb-2">
                  <p className="text-sm font-semibold text-stone-700">{g}</p>
                  <p className="text-xs font-medium" style={{color:t.accentText}}>{fmtItShort(addDays(weekStart,i))}</p>
                </div>
                <div className="flex items-center gap-2">
                  <Field label="Entrata" value={grid[g].in} onChange={v=>setCell(g,"in",v)} options={ENTRATA} />
                  <span className="text-stone-300 mt-5">→</span>
                  <Field label="Uscita" value={grid[g].out} onChange={v=>setCell(g,"out",v)} options={USCITA} />
                </div>
              </div>
            ))}
          </div>
          <button onClick={save} style={{background:t.gradient,color:t.onGradient}} className="mt-5 w-full rounded-2xl py-3.5 font-semibold flex items-center justify-center gap-2 active:scale-[0.99]">
            {saved?<><Icon name="check" className="h-5 w-5" /> Ore salvate</>:<><Icon name="save" className="h-5 w-5" /> Salva la settimana</>}
          </button>
        </div>
      );
    }
    function Field({label,value,onChange,options}){
      return (
        <label className="flex-1">
          <span className="block text-xs text-stone-400 mb-1">{label}</span>
          <select value={value} onChange={e=>onChange(e.target.value)} className="w-full rounded-xl border border-stone-200 bg-stone-50 px-3 py-2.5 text-sm font-medium text-stone-800 focus:outline-none focus:ring-2 focus:ring-stone-300">
            {options.map(o=><option key={o}>{o}</option>)}
          </select>
        </label>
      );
    }

    // ── Spese ──
    function Spese({center,role,user,expenses,fund,t}){
      const [desc,setDesc]=useState("");
      const [amount,setAmount]=useState("");
      const [cat,setCat]=useState(CATEGORIES[0]);
      const [addFund,setAddFund]=useState("");
      const speso=expenses.reduce((s,e)=>s+(e.amount||0),0);
      const saldo=fund-speso;
      const add=()=>{const n=parseFloat(amount.replace(",","."));if(!desc.trim()||isNaN(n))return;ref(`expenses/${center}`).push({desc:desc.trim(),amount:n,cat,date:TODAY,by:user.email});setDesc("");setAmount("");setCat(CATEGORIES[0]);};
      const remove=(id)=>ref(`expenses/${center}/${id}`).remove();
      const addToFund=()=>{const n=parseFloat(addFund.replace(",","."));if(isNaN(n))return;ref(`funds/${center}`).set(fund+n);setAddFund("");};
      return (
        <div>
          <div className="rounded-3xl p-5 mb-5 shadow-lg" style={{background:t.gradient,color:t.onGradient}}>
            <div className="flex items-center gap-2 text-xs font-semibold uppercase tracking-wider" style={{opacity:.8}}><Icon name="wallet" className="h-4 w-4" /> Cassa del centro</div>
            <p className="text-3xl font-bold mt-1">{euro(saldo)}</p>
            <div className="mt-3 flex gap-4 text-xs font-medium" style={{opacity:.85}}>
              <span>Fondo dato {euro(fund)}</span>
              <span className="flex items-center gap-1"><Icon name="arrowDR" className="h-3.5 w-3.5" /> Speso {euro(speso)}</span>
            </div>
          </div>
          {role==="admin" && (
            <div className="mb-6">
              <p className="text-sm font-semibold text-stone-700 mb-2">Registra soldi consegnati</p>
              <div className="flex gap-2">
                <input value={addFund} onChange={e=>setAddFund(e.target.value)} inputMode="decimal" placeholder="Importo €" className="flex-1 rounded-2xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
                <button onClick={addToFund} className="px-4 rounded-2xl bg-stone-800 text-white text-sm font-semibold active:scale-95">Aggiungi</button>
              </div>
            </div>
          )}
          <h2 className="text-lg font-bold text-stone-800 mb-3">Spese</h2>
          <div className="bg-white rounded-2xl p-4 shadow-sm space-y-3 mb-4">
            <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Descrizione" className="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
            <div className="flex gap-2">
              <input value={amount} onChange={e=>setAmount(e.target.value)} inputMode="decimal" placeholder="€ 0,00" className="w-28 rounded-xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300" />
              <select value={cat} onChange={e=>setCat(e.target.value)} className="flex-1 rounded-xl border border-stone-200 bg-stone-50 px-3 py-3 text-sm font-medium text-stone-800 focus:outline-none focus:ring-2 focus:ring-stone-300">
                {CATEGORIES.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <button onClick={add} style={{background:t.gradient,color:t.onGradient}} className="w-full rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.99]"><Icon name="plus" className="h-5 w-5" /> Aggiungi spesa</button>
          </div>
          <div className="space-y-2">
            {expenses.length===0 && <p className="text-sm text-stone-400 text-center py-6">Nessuna spesa registrata.</p>}
            {expenses.map(e=>(
              <div key={e.id} className="flex items-center gap-3 bg-white rounded-2xl p-3 shadow-sm">
                <div className="flex-1 min-w-0"><p className="font-medium text-stone-800 truncate">{e.desc}</p><p className="text-xs text-stone-400">{e.cat}{e.date?` · ${fmtIt(e.date)}`:""}</p></div>
                <p className="font-semibold text-stone-800">{euro(e.amount)}</p>
                {role==="admin" && <button onClick={()=>remove(e.id)} className="text-stone-300 active:text-rose-500"><Icon name="trash" className="h-4 w-4" /></button>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
